<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Revamp Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
    }

    .header {
      background: #111;
      color: #fff;
      padding: 15px;
      text-align: center;
      font-size: 20px;
    }

    .container {
      padding: 20px;
      max-width: 900px;
      margin: auto;
    }

    .card {
      background: #fff;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 20px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    .btn {
      background: #f97316;
      color: #fff;
      padding: 10px 15px;
      border-radius: 8px;
      text-decoration: none;
      display: inline-block;
      margin-top: 10px;
      cursor: pointer;
      border: none;
      font-size: 14px;
    }

    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 9999;
      align-items: center;
      justify-content: center;
    }

    .modal-box {
      background: #fff;
      width: 90%;
      max-width: 500px;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    .modal-box h3 {
      margin-top: 0;
    }

    .modal-box input,
    .modal-box textarea {
      width: 100%;
      padding: 10px;
      margin-bottom: 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 14px;
      box-sizing: border-box;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn-secondary {
      background: #666;
    }
  </style>
</head>

<body>

  <div class="header">Revamp Dashboard</div>

  <div class="container">

    <div class="card">
      <h2 id="userEmail">Loading...</h2>
      <p id="userRole"></p>
    </div>

    <div class="card">
      <h3>My Profile</h3>
      <button class="btn" id="editProfileBtn">Edit Profile</button>
    </div>

    <div class="card" id="roleSection"></div>

  </div>

  <div class="modal" id="profileModal">
    <div class="modal-box">
      <h3>Edit Profile</h3>

      <input type="text" id="profileName" placeholder="Full Name">
      <input type="text" id="profileCompany" placeholder="Company Name">
      <input type="text" id="profileTrade" placeholder="Trade">
      <input type="text" id="profileLocation" placeholder="Location">
      <textarea id="profileBio" rows="4" placeholder="Bio"></textarea>

      <div class="modal-actions">
        <button class="btn" id="saveProfileBtn">Save Profile</button>
        <button class="btn btn-secondary" id="closeProfileBtn">Close</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    const client = window.supabase.createClient(
      "https://dezvwoedboikshqttdqu.supabase.co",
      "YOUR_REAL_SUPABASE_ANON_KEY_HERE"
    );

    let currentUser = null;
    let currentProfile = null;

    async function loadDashboard() {
      console.log("DASHBOARD LOADING");

      const { data: { user }, error: userError } = await client.auth.getUser();

      if (userError) {
        console.log("USER ERROR:", userError);
        return;
      }

      if (!user) {
        alert("You must be logged in");
        window.location.href = "map.html";
        return;
      }

      currentUser = user;
      document.getElementById("userEmail").innerText = user.email;

      const { data: profile, error: profileError } = await client
        .from("profiles")
        .select("*")
        .eq("id", user.id)
        .maybeSingle();

      if (profileError) {
        console.log("PROFILE ERROR:", profileError);
        document.getElementById("userRole").innerText = "Profile error";
        return;
      }

      if (!profile) {
        document.getElementById("userRole").innerText = "No profile found";
        document.getElementById("roleSection").innerHTML = `
          <h3>No role tools yet</h3>
          <p>Your profile row was not found in Supabase.</p>
        `;
        return;
      }

      currentProfile = profile;
      document.getElementById("userRole").innerText = "Role: " + (profile.role || "none");

      if (profile.role === "contractor") {
        document.getElementById("roleSection").innerHTML = `
          <h3>Contractor Tools</h3>
          <button class="btn">My Bids</button>
          <button class="btn">My Jobs</button>
        `;
      } else if (profile.role === "homeowner") {
        document.getElementById("roleSection").innerHTML = `
          <h3>Homeowner Tools</h3>
          <button class="btn">My Jobs</button>
          <button class="btn">Post a Job</button>
        `;
      } else {
        document.getElementById("roleSection").innerHTML = `
          <h3>No role tools yet</h3>
          <p>This account does not have a contractor or homeowner role yet.</p>
        `;
      }
    }

    function openEditProfile() {
      console.log("EDIT PROFILE CLICKED");

      if (currentProfile) {
        document.getElementById("profileName").value = currentProfile.name || "";
        document.getElementById("profileCompany").value = currentProfile.company || "";
        document.getElementById("profileTrade").value = currentProfile.trade || "";
        document.getElementById("profileLocation").value = currentProfile.location || "";
        document.getElementById("profileBio").value = currentProfile.bio || "";
      }

      document.getElementById("profileModal").style.display = "flex";
    }

    function closeEditProfile() {
      document.getElementById("profileModal").style.display = "none";
    }

    async function saveProfile() {
      if (!currentUser) {
        alert("No logged in user found");
        return;
      }

      const updates = {
        id: currentUser.id,
        email: currentUser.email,
        name: document.getElementById("profileName").value.trim(),
        company: document.getElementById("profileCompany").value.trim(),
        trade: document.getElementById("profileTrade").value.trim(),
        location: document.getElementById("profileLocation").value.trim(),
        bio: document.getElementById("profileBio").value.trim()
      };

      const { error } = await client
        .from("profiles")
        .upsert(updates);

      if (error) {
        console.log("SAVE ERROR:", error);
        alert("Could not save profile");
        return;
      }

      alert("Profile saved");
      closeEditProfile();
      loadDashboard();
    }

    document.getElementById("editProfileBtn").addEventListener("click", openEditProfile);
    document.getElementById("closeProfileBtn").addEventListener("click", closeEditProfile);
    document.getElementById("saveProfileBtn").addEventListener("click", saveProfile);

    loadDashboard();
  </script>

</body>
</html>
