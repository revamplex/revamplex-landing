<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Revamp Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      color: #111;
    }

    .header {
      background: #111;
      color: #fff;
      padding: 15px 20px;
      text-align: center;
      font-size: 20px;
      font-weight: 700;
      position: relative;
    }

    .back-btn {
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      background: #fff;
      color: #111;
      border: none;
      border-radius: 999px;
      padding: 8px 14px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }

    .container {
      padding: 24px;
      max-width: 900px;
      margin: auto;
    }

    .card {
      background: #fff;
      padding: 24px;
      border-radius: 12px;
      margin-bottom: 20px;
      box-shadow: 0 5px 18px rgba(0,0,0,0.08);
    }

    .btn {
      background: #f97316;
      color: #fff;
      padding: 10px 16px;
      border-radius: 8px;
      cursor: pointer;
      border: none;
      font-size: 14px;
      font-weight: 700;
    }

    .btn.secondary {
      background: #111;
      margin-left: 8px;
    }

    .muted {
      color: #666;
      font-size: 14px;
      line-height: 1.5;
    }

    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 9999;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .modal.active {
      display: flex;
    }

    .modal-box {
      background: #fff;
      width: 100%;
      max-width: 560px;
      max-height: 90vh;
      overflow-y: auto;
      padding: 22px;
      border-radius: 14px;
    }

    .modal-box input,
    .modal-box textarea {
      width: 100%;
      padding: 11px;
      margin-bottom: 12px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 15px;
    }

    .modal-box textarea {
      min-height: 95px;
      resize: vertical;
    }

    .contractor-only {
      display: none;
    }

    .trade-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin: 8px 0 14px;
    }

    .trade-option {
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 9px;
      font-size: 14px;
      display: flex;
      gap: 8px;
      align-items: center;
      cursor: pointer;
    }

    .trade-option input {
      width: auto;
      margin: 0;
    }

    @media (max-width: 600px) {
      .header { padding-top: 52px; }
      .back-btn {
        top: 14px;
        transform: none;
      }
      .container { padding: 14px; }
      .trade-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

<body>

<div class="header">
  <button class="back-btn" onclick="goBackToMap()">← Back to Map</button>
  Revamp Dashboard
</div>

<div class="container">
  <div class="card">
    <h2 id="userEmail">Loading...</h2>
    <p id="userRole"></p>
  </div>

  <div class="card">
    <h3>My Profile</h3>

    <p><strong>Name:</strong> <span id="displayName">—</span></p>
    <p class="contractor-display"><strong>Company:</strong> <span id="displayCompany">—</span></p>
    <p class="contractor-display"><strong>Trades:</strong> <span id="displayTrade">—</span></p>
    <p><strong>Location:</strong> <span id="displayLocation">—</span></p>
    <p><strong>Bio:</strong> <span id="displayBio">—</span></p>

    <button class="btn" onclick="openEditProfile()">Edit Profile</button>
  </div>
</div>

<div class="modal" id="profileModal">
  <div class="modal-box">
    <h3>Edit Profile</h3>

    <input id="profileName" placeholder="Full Name" />

    <div class="contractor-only">
      <input id="profileCompany" placeholder="Company Name" />

      <p><strong>Select Your Trades</strong></p>
      <div class="trade-grid" id="tradeCheckboxes">
        <label class="trade-option"><input type="checkbox" value="Kitchen Renovation"> Kitchen Renovation</label>
        <label class="trade-option"><input type="checkbox" value="Bathroom Renovation"> Bathroom Renovation</label>
        <label class="trade-option"><input type="checkbox" value="Additions & Remodeling"> Additions & Remodeling</label>
        <label class="trade-option"><input type="checkbox" value="Roofing"> Roofing</label>
        <label class="trade-option"><input type="checkbox" value="Siding"> Siding</label>
        <label class="trade-option"><input type="checkbox" value="Tile"> Tile</label>
        <label class="trade-option"><input type="checkbox" value="Drywall"> Drywall</label>
        <label class="trade-option"><input type="checkbox" value="Painting"> Painting</label>
        <label class="trade-option"><input type="checkbox" value="Flooring"> Flooring</label>
        <label class="trade-option"><input type="checkbox" value="Plumbing"> Plumbing</label>
        <label class="trade-option"><input type="checkbox" value="Electrical"> Electrical</label>
        <label class="trade-option"><input type="checkbox" value="Masonry / Concrete"> Masonry / Concrete</label>
      </div>
    </div>

    <input id="profileLocation" placeholder="Location" />
    <textarea id="profileBio" placeholder="Bio"></textarea>

    <button class="btn" id="saveProfileBtn">Save</button>
    <button class="btn secondary" id="closeProfileBtn">Close</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const client = window.supabase.createClient(
  "https://dezvwoedboikshqttdqu.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRlenZ3b2VkYm9pa3NocXR0ZHF1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwMDMzNzQsImV4cCI6MjA4ODU3OTM3NH0.5SGfJadjBug9oDOrdvjIM36SwFxe1_yzpry0q67iM-E"
);

let currentUser = null;
let currentProfile = null;

function goBackToMap() {
  const role = (currentProfile && currentProfile.role) ? currentProfile.role : localStorage.getItem("revamplex_role") || "homeowner";
  window.location.href = "map.html?view=" + encodeURIComponent(role);
}

function cleanText(value) {
  return (value || "").trim();
}

function isContractorProfile() {
  return ((currentProfile && currentProfile.role) || "").toLowerCase() === "contractor";
}

function setText(id, value) {
  document.getElementById(id).innerText = value || "—";
}

function getSelectedTrades() {
  return Array.from(document.querySelectorAll("#tradeCheckboxes input[type='checkbox']:checked"))
    .map(cb => cb.value)
    .join(", ");
}

function refreshDisplay() {
  if (!currentProfile) return;

  const isContractor = isContractorProfile();

  document.getElementById("userEmail").innerText = currentUser.email;
  document.getElementById("userRole").innerText = "Role: " + (currentProfile.role || "none");

  setText("displayName", currentProfile.name);
  setText("displayCompany", currentProfile.company);
  setText("displayTrade", currentProfile.trade);
  setText("displayLocation", currentProfile.location);
  setText("displayBio", currentProfile.bio);

  document.querySelectorAll(".contractor-display").forEach(el => {
    el.style.display = isContractor ? "block" : "none";
  });
}

async function loadDashboard() {
  const { data: { session }, error: sessionError } = await client.auth.getSession();

  if (sessionError) {
    alert("Session error: " + sessionError.message);
    return;
  }

  if (!session) {
    window.location.href = "map.html";
    return;
  }

  currentUser = session.user;
  document.getElementById("userEmail").innerText = currentUser.email;

  const { data: profile, error } = await client
    .from("profiles")
    .select("*")
    .eq("id", currentUser.id)
    .maybeSingle();

  if (error) {
    alert("Profile load error: " + error.message);
    return;
  }

  if (!profile) {
    const role = localStorage.getItem("revamplex_role") || "homeowner";

    const { data: newProfile, error: insertError } = await client
      .from("profiles")
      .insert({
        id: currentUser.id,
        email: currentUser.email,
        role: role
      })
      .select("*")
      .single();

    if (insertError) {
      alert("Could not create profile: " + insertError.message);
      return;
    }

    currentProfile = newProfile;
  } else {
    currentProfile = profile;
  }

  refreshDisplay();
}

function openEditProfile() {
  if (!currentProfile) {
    alert("Profile is still loading. Refresh the page and try again.");
    return;
  }

  const isContractor = isContractorProfile();

  document.getElementById("profileName").value = currentProfile.name || "";
  document.getElementById("profileCompany").value = currentProfile.company || "";
  document.getElementById("profileLocation").value = currentProfile.location || "";
  document.getElementById("profileBio").value = currentProfile.bio || "";

  const savedTrades = (currentProfile.trade || "")
    .split(",")
    .map(t => t.trim())
    .filter(Boolean);

  document.querySelectorAll("#tradeCheckboxes input[type='checkbox']").forEach(cb => {
    cb.checked = savedTrades.includes(cb.value);
  });

  document.querySelectorAll(".contractor-only").forEach(el => {
    el.style.display = isContractor ? "block" : "none";
  });

  document.getElementById("profileModal").classList.add("active");
}

function closeEditProfile() {
  document.getElementById("profileModal").classList.remove("active");
}

async function saveProfile() {
  if (!currentUser || !currentProfile) {
    alert("Profile is not ready yet. Refresh and try again.");
    return;
  }

  const isContractor = isContractorProfile();
  const selectedTrades = getSelectedTrades();

  const updateData = {
    id: currentUser.id,
    email: currentUser.email,
    role: currentProfile.role,
    name: cleanText(document.getElementById("profileName").value),
    location: cleanText(document.getElementById("profileLocation").value),
    bio: cleanText(document.getElementById("profileBio").value)
  };

  if (isContractor) {
    updateData.company = cleanText(document.getElementById("profileCompany").value);
    updateData.trade = selectedTrades;
  } else {
    updateData.company = null;
    updateData.trade = null;
  }

  const { data, error } = await client
    .from("profiles")
    .upsert(updateData)
    .select("*")
    .single();

  if (error) {
    alert("Could not save profile: " + error.message);
    return;
  }

  currentProfile = data;

  if (isContractor) {
    const contractorData = {
      id: currentUser.id,
      name: updateData.name,
      trade: selectedTrades,
      location: updateData.location,
      lat: 40.9,
      lng: -74.1,
      rating: 5,
      reviews: 1
    };

    const { error: contractorError } = await client
      .from("contractors")
      .upsert(contractorData);

    if (contractorError) {
      alert("Profile saved, but contractor map card was NOT saved: " + contractorError.message);
      refreshDisplay();
      closeEditProfile();
      return;
    }
  }

  refreshDisplay();
  closeEditProfile();
  alert("Saved");
}

window.onload = function () {
  document.getElementById("closeProfileBtn").onclick = closeEditProfile;
  document.getElementById("saveProfileBtn").onclick = saveProfile;
  loadDashboard();
};
</script>

</body>
</html>
