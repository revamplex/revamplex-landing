<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Revamp Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #f5f5f5; }
    .header { background: #111; color: #fff; padding: 15px; text-align: center; font-size: 20px; }
    .container { padding: 20px; max-width: 900px; margin: auto; }
    .card { background: #fff; padding: 20px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
    .btn { background: #f97316; color: #fff; padding: 10px 15px; border-radius: 8px; cursor: pointer; border: none; font-size: 14px; }
    .btn.secondary { background: #111; margin-left: 8px; }
    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 9999; }
    .modal.active { display: flex; align-items: center; justify-content: center; }
    .modal-box { background: #fff; width: 90%; max-width: 500px; padding: 20px; border-radius: 12px; }
    .modal-box input, .modal-box select { width: 100%; padding: 10px; margin-bottom: 12px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; }
    .note { color: #666; font-size: 13px; line-height: 1.4; }
  </style>
</head>

<body>
<div class="header">Revamp Dashboard</div>

<div class="container">
  <div class="card">
    <h2 id="userEmail">Loading...</h2>
    <p id="userRole"></p>
  </div>

  <div class="card">
    <h3>My Profile</h3>
    <p><strong>Email:</strong> <span id="displayEmail">—</span></p>
    <p><strong>Role:</strong> <span id="displayRole">—</span></p>
    <p class="note">
      This safe version only saves email and role because your Supabase profiles table does not currently have name, company, trade, location, or bio columns.
    </p>
    <button class="btn" onclick="openEditProfile()">Edit Profile</button>
  </div>
</div>

<div class="modal" id="profileModal">
  <div class="modal-box">
    <h3>Edit Profile</h3>

    <input id="profileEmail" placeholder="Email" disabled>

    <select id="profileRole">
      <option value="homeowner">homeowner</option>
      <option value="contractor">contractor</option>
    </select>

    <button class="btn" id="saveProfileBtn">Save</button>
    <button class="btn secondary" id="closeProfileBtn">Close</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const client = window.supabase.createClient(
  "https://dezvwoedboikshqttdqu.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRlenZ3b2VkYm9pa3NocXR0ZHF1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwMDMzNzQsImV4cCI6MjA4ODU3OTM3NH0.5SGfJadjBug9oDOrdvjIM36SwFxe1_yzpry0q67iM-E"
);

let currentUser = null;
let currentProfile = null;

function setText(id, value) {
  document.getElementById(id).innerText = value || "—";
}

function refreshDisplay() {
  setText("userEmail", currentUser?.email || "Loading...");
  setText("userRole", "Role: " + (currentProfile?.role || "none"));
  setText("displayEmail", currentProfile?.email || currentUser?.email || "—");
  setText("displayRole", currentProfile?.role || "—");
}

async function loadDashboard() {
  const { data: { session } } = await client.auth.getSession();

  if (!session) {
    window.location.href = "map.html";
    return;
  }

  currentUser = session.user;

  const { data: profile, error } = await client
    .from("profiles")
    .select("id,email,role")
    .eq("id", currentUser.id)
    .maybeSingle();

  if (error) {
    alert("Profile load error: " + error.message);
    return;
  }

  if (!profile) {
    const role = localStorage.getItem("revamplex_role") || "homeowner";

    const { data: newProfile, error: insertError } = await client
      .from("profiles")
      .insert({
        id: currentUser.id,
        email: currentUser.email,
        role: role
      })
      .select("id,email,role")
      .single();

    if (insertError) {
      alert("Could not create profile: " + insertError.message);
      return;
    }

    currentProfile = newProfile;
  } else {
    currentProfile = profile;
  }

  refreshDisplay();
}

function openEditProfile() {
  if (!currentUser) return;

  document.getElementById("profileEmail").value = currentProfile?.email || currentUser.email || "";
  document.getElementById("profileRole").value = currentProfile?.role || "homeowner";
  document.getElementById("profileModal").classList.add("active");
}

function closeEditProfile() {
  document.getElementById("profileModal").classList.remove("active");
}

async function saveProfile() {
  if (!currentUser) return;

  const selectedRole = document.getElementById("profileRole").value || "homeowner";

  const { data, error } = await client
    .from("profiles")
    .upsert({
      id: currentUser.id,
      email: currentUser.email,
      role: selectedRole
    })
    .select("id,email,role")
    .single();

  if (error) {
    alert("Could not save profile: " + error.message);
    return;
  }

  currentProfile = data;
  localStorage.setItem("revamplex_role", selectedRole);
  refreshDisplay();
  closeEditProfile();
  alert("Saved");
}

window.onload = function () {
  document.getElementById("closeProfileBtn").onclick = closeEditProfile;
  document.getElementById("saveProfileBtn").onclick = saveProfile;
  loadDashboard();
};
</script>
</body>
</html>
