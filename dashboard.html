<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Revamp Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
    }

    .header {
      background: #111;
      color: #fff;
      padding: 15px;
      text-align: center;
      font-size: 20px;
    }

    .container {
      padding: 20px;
      max-width: 900px;
      margin: auto;
    }

    .card {
      background: #fff;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 20px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    .btn {
      background: #f97316;
      color: #fff;
      padding: 10px 15px;
      border-radius: 8px;
      cursor: pointer;
      border: none;
      font-size: 14px;
    }

    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 9999;
      align-items: center;
      justify-content: center;
    }

    .modal-box {
      background: #fff;
      width: 90%;
      max-width: 500px;
      padding: 20px;
      border-radius: 12px;
    }

    .modal-box input,
    .modal-box textarea {
      width: 100%;
      padding: 10px;
      margin-bottom: 12px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    .contractor-only {
      display: none;
    }
  </style>
</head>

<body>

<div class="header">Revamp Dashboard</div>

<div class="container">

  <div class="card">
    <h2 id="userEmail">Loading...</h2>
    <p id="userRole"></p>
  </div>

  <div class="card">
    <h3>My Profile</h3>
    <button class="btn" onclick="openEditProfile()">Edit Profile</button>
  </div>

</div>

<div class="modal" id="profileModal">
  <div class="modal-box">
    <h3>Edit Profile</h3>

    <input id="profileName" placeholder="Full Name">

    <div class="contractor-only">
      <input id="profileCompany" placeholder="Company Name">
    </div>

    <div class="contractor-only">
      <input id="profileTrade" placeholder="Trade">
    </div>

    <input id="profileLocation" placeholder="Location">
    <textarea id="profileBio" placeholder="Bio"></textarea>

    <button class="btn" id="saveProfileBtn">Save</button>
    <button class="btn" id="closeProfileBtn">Close</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const client = window.supabase.createClient(
  "https://dezvwoedboikshqttdqu.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRlenZ3b2VkYm9pa3NocXR0ZHF1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwMDMzNzQsImV4cCI6MjA4ODU3OTM3NH0.5SGfJadjBug9oDOrdvjIM36SwFxe1_yzpry0q67iM-E"
);

let currentUser = null;
let currentProfile = null;

async function loadDashboard() {
  const { data: { session } } = await client.auth.getSession();

  if (!session) {
    window.location.href = "map.html";
    return;
  }

  currentUser = session.user;

  document.getElementById("userEmail").innerText = currentUser.email;

  const { data: profile } = await client
    .from("profiles")
    .select("*")
    .eq("id", currentUser.id)
    .single();

  currentProfile = profile;

  document.getElementById("userRole").innerText =
    "Role: " + (profile.role || "none");
}

function openEditProfile() {

  document.getElementById("profileName").value = currentProfile.name || "";
  document.getElementById("profileCompany").value = currentProfile.company || "";
  document.getElementById("profileTrade").value = currentProfile.trade || "";
  document.getElementById("profileLocation").value = currentProfile.location || "";
  document.getElementById("profileBio").value = currentProfile.bio || "";

  const isContractor =
    (currentProfile.role || "").toLowerCase() === "contractor";

  document.querySelectorAll(".contractor-only").forEach(el => {
    el.style.display = isContractor ? "block" : "none";
  });

  document.getElementById("profileModal").style.display = "flex";
}

function closeEditProfile() {
  document.getElementById("profileModal").style.display = "none";
}

async function saveProfile() {
  await client.from("profiles").upsert({
    id: currentUser.id,
    email: currentUser.email,
    name: document.getElementById("profileName").value,
    company: document.getElementById("profileCompany").value,
    trade: document.getElementById("profileTrade").value,
    location: document.getElementById("profileLocation").value,
    bio: document.getElementById("profileBio").value
  });

  alert("Saved");
  closeEditProfile();
  loadDashboard();
}

window.onload = function () {
  document.getElementById("closeProfileBtn").onclick = closeEditProfile;
  document.getElementById("saveProfileBtn").onclick = saveProfile;

  loadDashboard();
};
</script>

</body>
</html>
