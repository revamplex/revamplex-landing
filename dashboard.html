<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Revamp Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
    }

    .header {
      background: #111;
      color: #fff;
      padding: 15px;
      text-align: center;
      font-size: 20px;
    }

    .container {
      padding: 20px;
      max-width: 900px;
      margin: auto;
    }

    .card {
      background: #fff;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 20px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    .btn {
      background: #f97316;
      color: #fff;
      padding: 10px 15px;
      border-radius: 8px;
      text-decoration: none;
      display: inline-block;
      margin-top: 10px;
      cursor: pointer;
    }
  </style>

</head>

<body>

<div class="header">Revamp Dashboard</div>

<div class="container">

  <div class="card">
    <h2 id="userEmail">Loading...</h2>
    <p id="userRole"></p>
  </div>

  <div class="card">
    <h3>My Profile</h3>
    <button class="btn">Edit Profile</button>
  </div>

  <div class="card" id="roleSection"></div>

</div>
  
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const client = window.supabase.createClient(
  "https://dezvwoedboikshqttdqu.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRlenZ3b2VkYm9pa3NocXR0ZHF1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwMDMzNzQsImV4cCI6MjA4ODU3OTM3NH0.5SGfJadjBug9oDOrdvjIM36SwFxe1_yzpry0q67iM-E"
);

async function loadDashboard() {
console.log("DASHBOARD LOADING");
  const { data: { user } } = await client.auth.getUser();

  if (!user) {
    alert("You must be logged in");
    window.location.href = "map.html";
    return;
  }

  document.getElementById("userEmail").innerText = user.email;

 const { data: profile, error } = await client
  .from("profiles")
  .select("role")
  .eq("id", user.id)
  .maybeSingle();

if (error || !profile) {
  console.log("PROFILE ERROR:", error);

  document.getElementById("userRole").innerText = "No profile found";
  return;
}

document.getElementById("userRole").innerText = "Role: " + profile.role;
  const roleSection = document.getElementById("roleSection");

  if (profile.role === "contractor") {
    roleSection.innerHTML = `
      <h3>Contractor Tools</h3>
      <button class="btn">My Bids</button>
      <button class="btn">My Jobs</button>
    `;
  }

  if (profile.role === "homeowner") {
    roleSection.innerHTML = `
      <h3>Homeowner Tools</h3>
      <button class="btn">My Jobs</button>
      <button class="btn">Post a Job</button>
    `;
  }

}

loadDashboard();
</script>

</body>
</html>
