<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Revamp Project Room</title>

<style>

body{
font-family:Arial, Helvetica, sans-serif;
margin:0;
background:#f5f7fb;
}

.topbar{
background:white;
border-bottom:1px solid #ddd;
padding:14px 20px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-weight:700;
font-size:20px;
color:#f97316;
}

.container{
max-width:900px;
margin:auto;
padding:30px;
}

.card{
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.06);
margin-bottom:25px;
}

.card h2{
margin-top:0;
}

input, textarea{
width:100%;
padding:10px;
margin-top:6px;
margin-bottom:16px;
border-radius:6px;
border:1px solid #ccc;
}

button{
background:#f97316;
border:none;
color:white;
padding:12px 18px;
border-radius:6px;
cursor:pointer;
font-weight:600;
}

button:hover{
background:#ea580c;
}

.back{
background:#ddd;
color:black;
margin-right:10px;
}

.tools{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

.tool{
background:#fafafa;
border:1px solid #eee;
padding:15px;
border-radius:8px;
}

</style>

</head>

<body>

<div class="topbar">

<div class="logo">REVAMP</div>

<div>

<button class="back" onclick="goBack()">Back to Project Feed</button>

</div>

</div>

<div class="container">

<div class="card">

<h2>Project Details</h2>

<div id="jobInfo"></div>

</div>


<div class="card">

<h2>Contractor Tools</h2>

<div class="tools">

<div class="tool">

<b>Material Calculator</b>

<p>Coming soon</p>

</div>

<div class="tool">

<b>Labor Calculator</b>

<p>Coming soon</p>

</div>

<div class="tool">

<b>Profit Margin Slider</b>

<p>Coming soon</p>

</div>

<div class="tool">

<b>Estimate Builder</b>

<p>Coming soon</p>

</div>

</div>

</div>


<div class="card">

<h2>Submit Bid</h2>

<label>Contractor Name</label>
<input id="contractorName">

<label>Bid Amount ($)</label>
<input id="bidAmount">

<label>Estimated Start Date</label>
<input id="startDate" type="date">

<label>Message</label>
<textarea id="bidMessage"></textarea>

<button onclick="submitBid()">Submit Bid</button>

</div>

</div>

<script>

const params = new URLSearchParams(window.location.search)

const jobId = Number(params.get("job"))

let jobs = JSON.parse(localStorage.getItem("revampJobs")) || []

const job = jobs.find(j => j.id === jobId)

if(job){

document.getElementById("jobInfo").innerHTML = `

<b>${job.title}</b><br>
${job.city}<br><br>
${job.description}<br><br>
Budget: ${job.budget}

`

}


const BID_PLANS = {

trial:5,
bronze:5,
silver:10,
gold:15

}


function getPlan(){

return localStorage.getItem("revamp_plan") || "trial"

}

function getBidCount(){

return Number(localStorage.getItem("revamp_bid_count") || 0)

}

function incrementBid(){

let count = getBidCount() + 1

localStorage.setItem("revamp_bid_count",count)

}


function submitBid(){

const contractor = document.getElementById("contractorName").value

const amount = document.getElementById("bidAmount").value

const message = document.getElementById("bidMessage").value

const startDate = document.getElementById("startDate").value


if(!contractor || !amount){

alert("Please complete the form")

return

}


const plan = getPlan()

const limit = BID_PLANS[plan]

if(getBidCount() >= limit){

alert("You reached your monthly bid limit.")

return

}


const maxBids = job.maxBids || 5

if(job.bids.length >= maxBids){

alert("This job already received the maximum bids.")

return

}


const bid = {

contractor,
amount,
message,
startDate,
timestamp:Date.now()

}

job.bids.push(bid)

incrementBid()

localStorage.setItem("revampJobs",JSON.stringify(jobs))

alert("Bid submitted successfully")

window.location.href = "map.html"

}


function goBack(){

window.location.href = "map.html"

}

</script>

</body>
</html>
