<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>

<script>

mapboxgl.accessToken = 'pk.eyJ1IjoicmV2YW1wbGV4IiwiYSI6ImNtbWp0YjZyejE2c2gyd3Bucml6YTMzYzMifQ.qIuzgtSyYxQhR97_SvmNJw';

const map = new mapboxgl.Map({
container: 'map',
style: 'mapbox://styles/mapbox/streets-v11',
center: [-74.0431,40.7376],
zoom: 12
});

const SUPABASE_URL = "https://dezvwoedboikshqttdqu.supabase.co";
const SUPABASE_KEY = "sb_publishable_d7HgmUOfp09JeQ987AicZw_Qk7n2MVo";

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function loadJobs() {

const { data, error } = await supabaseClient
.from('jobs')
.select('*');

if(error){
console.log(error);
return;
}

data.forEach(job => {

new mapboxgl.Marker()
.setLngLat([job.longitude, job.latitude])
.setPopup(
new mapboxgl.Popup().setHTML(
"<h3>" + job.title + "</h3><p>" + job.budget + "</p>"
)
)
.addTo(map);

});

}

map.on('load', () => {
loadJobs();
});

</script>

</body>
</html>
