<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Revamp Map v4</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />

  <style>
    :root {
      --brand: #f97316;
      --brand-dark: #ea580c;
      --brand-soft: rgba(249, 115, 22, 0.12);
      --bg: #f8fafc;
      --card: rgba(255, 255, 255, 0.96);
      --text: #0f172a;
      --muted: #64748b;
      --line: rgba(15, 23, 42, 0.08);
      --shadow: 0 18px 42px rgba(15, 23, 42, 0.16);
      --shadow-soft: 0 10px 24px rgba(15, 23, 42, 0.1);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Inter, Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    button, input, select, textarea {
      font: inherit;
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    #map {
      position: absolute;
      inset: 0;
      z-index: 1;
    }

    .leaflet-container {
      width: 100%;
      height: 100%;
      background: #dbeafe;
    }

    .topbar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      padding: 12px;
      pointer-events: none;
      transition: transform 0.28s ease;
    }

    .topbar-inner {
      pointer-events: auto;
      max-width: 1180px;
      margin: 0 auto;
      border-radius: 26px;
      padding: 12px;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: var(--shadow-soft);
      border: 1px solid rgba(255, 255, 255, 0.75);
    }

    .search-row,
    .mode-row,
    .filter-row {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .search-row {
      margin-bottom: 10px;
    }
.logo-wrap {
  display: flex;
  align-items: center;
  margin-right: 8px;
}

.logo-wrap img {
  height: 42px;
  width: auto;
}
    .mode-row {
      margin-bottom: 10px;
    }

    .filter-row {
      overflow-x: auto;
      scrollbar-width: none;
    }

    .filter-row::-webkit-scrollbar {
      display: none;
    }

    .search-box {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 10px;
      height: 52px;
      border-radius: 18px;
      padding: 0 15px;
      background: #fff;
      border: 1px solid var(--line);
      box-shadow: 0 4px 10px rgba(15, 23, 42, 0.04);
    }

    .search-box input {
      width: 100%;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--text);
      font-size: 15px;
    }

    .search-btn,
    .mode-btn,
    .filter-pill,
    .filter-select,
    .action-btn,
    .mini-btn,
    .fab,
    .modal-btn,
    .close-btn,
    .restore-ui-btn,
    .favorite-btn {
      border: 0;
      cursor: pointer;
    }

    .search-btn {
      height: 52px;
      padding: 0 18px;
      border-radius: 18px;
      background: linear-gradient(135deg, var(--brand), var(--brand-dark));
      color: white;
      font-weight: 800;
      box-shadow: 0 10px 22px rgba(249, 115, 22, 0.28);
    }

    .mode-btn {
      flex: 1;
      height: 44px;
      border-radius: 14px;
      background: #fff;
      border: 1px solid var(--line);
      font-weight: 800;
      color: var(--text);
      box-shadow: 0 2px 6px rgba(15, 23, 42, 0.04);
    }

    .mode-btn.active {
      background: linear-gradient(135deg, var(--brand), var(--brand-dark));
      color: white;
      box-shadow: 0 8px 18px rgba(249, 115, 22, 0.24);
    }

    .filter-select,
    .filter-pill {
      flex: 0 0 auto;
      height: 42px;
      border-radius: 999px;
      padding: 0 14px;
      background: #fff;
      border: 1px solid var(--line);
      color: var(--text);
      font-weight: 700;
      white-space: nowrap;
      box-shadow: 0 2px 6px rgba(15, 23, 42, 0.04);
    }

    .filter-pill.active {
      background: var(--brand-soft);
      color: var(--brand-dark);
      border-color: rgba(249, 115, 22, 0.28);
    }

    .count-pill,
    .status-pill {
      position: absolute;
      z-index: 950;
      left: 50%;
      transform: translateX(-50%);
      border-radius: 999px;
      padding: 10px 15px;
      background: rgba(15, 23, 42, 0.82);
      color: white;
      font-size: 13px;
      font-weight: 800;
      backdrop-filter: blur(10px);
      box-shadow: var(--shadow-soft);
      pointer-events: none;
      transition: opacity 0.25s ease, transform 0.25s ease;
    }

    .count-pill {
      top: 182px;
    }

    .status-pill {
      top: 224px;
      background: rgba(249, 115, 22, 0.9);
      display: none;
    }

    .status-pill.show {
      display: block;
    }

    .results-shell {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 960;
      padding: 0 0 16px;
      pointer-events: none;
      transition: transform 0.28s ease;
    }

    .results-shell-inner {
      max-width: 1400px;
      margin: 0 auto;
    }

    .results-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 0 16px 10px;
      pointer-events: none;
    }

    .results-title {
      pointer-events: auto;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid rgba(255, 255, 255, 0.8);
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 800;
      box-shadow: var(--shadow-soft);
      backdrop-filter: blur(10px);
    }

    .results-actions {
      display: flex;
      gap: 8px;
      pointer-events: auto;
    }

    .action-btn {
      width: 42px;
      height: 42px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.95);
      box-shadow: var(--shadow-soft);
      color: var(--text);
      font-size: 18px;
      font-weight: 900;
    }

    .cards-row {
      display: flex;
      gap: 14px;
      overflow-x: auto;
      overflow-y: hidden;
      padding: 0 16px 40px;
      scroll-snap-type: x mandatory;
      scroll-behavior: smooth;
      scrollbar-width: none;
      pointer-events: auto;
    }

    .cards-row::-webkit-scrollbar {
      display: none;
    }

    .listing-card {
      flex: 0 0 340px;
      max-width: 340px;
      min-height: 236px;
      border-radius: 24px;
      background: var(--card);
      border: 1px solid rgba(255, 255, 255, 0.85);
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
      scroll-snap-align: center;
      overflow: hidden;
      transition: transform 0.22s ease, box-shadow 0.22s ease, border-color 0.22s ease;
      cursor: pointer;
    }

    .listing-card.active {
      transform: translateY(-6px);
      border-color: rgba(249, 115, 22, 0.3);
      box-shadow: 0 18px 44px rgba(249, 115, 22, 0.2);
    }

    .card-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 16px 10px;
    }

    .card-title-wrap {
      min-width: 0;
    }

    .card-title {
      margin: 0 0 6px;
      font-size: 18px;
      line-height: 1.2;
      font-weight: 900;
    }

    .card-sub {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
    }

    .rating-pill {
      border-radius: 999px;
      padding: 8px 10px;
      background: rgba(15, 23, 42, 0.06);
      font-size: 13px;
      font-weight: 900;
      white-space: nowrap;
      height: fit-content;
    }

    .card-body {
  padding: 0 16px 16px;
  display: flex;
  flex-direction: column;
}

    .meta-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 12px;
    }

    .meta-box {
      border-radius: 14px;
      background: #f8fafc;
      border: 1px solid var(--line);
      padding: 10px 12px;
    }

    .meta-label {
      margin-bottom: 4px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .meta-value {
      font-size: 14px;
      font-weight: 900;
    }

    .badge-row,
    .info-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .badge-row {
      margin-bottom: 12px;
    }

    .badge {
      border-radius: 999px;
      padding: 7px 10px;
      background: var(--brand-soft);
      color: var(--brand-dark);
      font-size: 12px;
      font-weight: 800;
    }

    .info-row {
      margin-bottom: 12px;
      color: var(--muted);
      font-size: 13px;
    }

    .info-row strong {
      color: var(--text);
    }

   .card-actions {
  display: flex;
  gap: 10px;
  align-items: center;
  margin-top: auto;
}

    .mini-btn {
      flex: 1;
      height: 42px;
      border-radius: 14px;
      font-size: 14px;
      font-weight: 900;
    }

    .mini-btn.primary {
      background: linear-gradient(135deg, var(--brand), var(--brand-dark));
      color: white;
      box-shadow: 0 10px 20px rgba(249, 115, 22, 0.2);
    }

    .mini-btn.secondary {
      background: white;
      color: var(--text);
      border: 1px solid var(--line);
    }

    .favorite-btn {
      flex: 0 0 42px;
      width: 42px;
      height: 42px;
      border-radius: 14px;
      background: white;
      color: var(--text);
      border: 1px solid var(--line);
      font-size: 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .favorite-btn.active {
      background: #fff7ed;
      border-color: rgba(249, 115, 22, 0.3);
    }

    .fab-wrap {
      position: absolute;
      right: 18px;
      bottom: 236px;
      z-index: 980;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .fab {
      height: 52px;
      border-radius: 999px;
      padding: 0 18px;
      background: linear-gradient(135deg, var(--brand), var(--brand-dark));
      color: white;
      font-weight: 900;
      box-shadow: 0 14px 28px rgba(249, 115, 22, 0.28);
    }

    .fab.secondary {
      background: rgba(15, 23, 42, 0.88);
      box-shadow: 0 12px 26px rgba(15, 23, 42, 0.22);
    }

    .restore-ui-btn {
      position: absolute;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1100;
      height: 42px;
      padding: 0 16px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.96);
      color: var(--text);
      font-size: 13px;
      font-weight: 900;
      box-shadow: var(--shadow-soft);
      border: 1px solid rgba(255,255,255,0.85);
      backdrop-filter: blur(10px);
      display: none;
    }

    .restore-ui-btn.show {
      display: block;
    }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 2000;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: rgba(15, 23, 42, 0.56);
      backdrop-filter: blur(6px);
    }

    .modal.show {
      display: flex;
    }

    .modal-card {
      width: min(520px, 100%);
      max-height: min(88vh, 820px);
      overflow: auto;
      border-radius: 24px;
      background: white;
      box-shadow: 0 26px 60px rgba(15, 23, 42, 0.28);
      padding: 20px;
    }

    .modal-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }

    .modal-title {
      margin: 0;
      font-size: 24px;
      font-weight: 900;
    }

    .close-btn {
      width: 38px;
      height: 38px;
      border-radius: 999px;
      background: #f1f5f9;
      color: var(--text);
      font-size: 20px;
      font-weight: 900;
    }

    .modal-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 12px;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    .label {
      font-size: 13px;
      font-weight: 800;
      color: var(--text);
    }

    .input,
    .textarea,
    .select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px 13px;
      background: white;
      color: var(--text);
      outline: none;
    }

    .textarea {
      min-height: 110px;
      resize: vertical;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 8px;
    }

    .modal-btn {
      flex: 1;
      height: 46px;
      border-radius: 14px;
      font-weight: 900;
    }

    .modal-btn.primary {
      background: linear-gradient(135deg, var(--brand), var(--brand-dark));
      color: white;
    }

    .modal-btn.secondary {
      background: white;
      border: 1px solid var(--line);
      color: var(--text);
    }

    .detail-modal .modal-card {
      width: min(680px, 100%);
    }

    .detail-stack {
      display: grid;
      gap: 12px;
    }

    .detail-panel {
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
      background: #f8fafc;
    }

    .detail-panel h4 {
      margin: 0 0 8px;
      font-size: 14px;
      font-weight: 900;
    }

    .detail-panel p {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
      font-size: 14px;
    }

    .map-pin {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--brand);
      border: 3px solid white;
      box-shadow: 0 10px 22px rgba(249, 115, 22, 0.34);
    }

    .map-pin.contractor {
      background: var(--brand);
    }

    .map-pin.job {
      background: #0f172a;
      box-shadow: 0 10px 22px rgba(15, 23, 42, 0.34);
    }

    .map-pin.active {
      width: 27px;
      height: 27px;
      border-width: 4px;
    }

    .leaflet-popup-content-wrapper {
      border-radius: 16px;
      box-shadow: var(--shadow-soft);
    }

    .leaflet-popup-content {
      margin: 14px 16px;
      font-family: Inter, Arial, Helvetica, sans-serif;
    }

    .popup-title {
      font-size: 15px;
      font-weight: 900;
      margin-bottom: 6px;
    }

    .popup-sub {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .ui-collapsed .topbar {
      transform: translateY(-115%);
    }

    .ui-collapsed .results-shell {
      transform: translateY(115%);
    }

    .ui-collapsed .count-pill {
      opacity: 0;
      transform: translateX(-50%) translateY(-12px);
    }

    .ui-collapsed .fab-wrap {
      opacity: 0.25;
    }

    @media (max-width: 900px) {
      .count-pill { top: 192px; }
      .status-pill { top: 234px; }
      .listing-card {
        flex-basis: 306px;
        max-width: 306px;
      }
    }

    @media (max-width: 640px) {
      .topbar {
        padding: 10px;
      }

      .topbar-inner {
        border-radius: 22px;
        padding: 10px;
      }

      .search-row,
      .mode-row {
        gap: 8px;
      }

      .search-box,
      .search-btn {
        height: 48px;
      }

      .mode-btn {
        height: 42px;
        font-size: 13px;
      }

      .count-pill {
        top: 186px;
        font-size: 12px;
      }

      .status-pill {
        top: 226px;
        font-size: 12px;
      }

      .results-header {
        padding: 0 12px 8px;
      }

      .cards-row {
        gap: 12px;
        padding: 0 12px 6px;
      }

      .listing-card {
        flex: 0 0 84vw;
        max-width: 84vw;
        min-height: 260px;
      }

      .fab-wrap {
        right: 12px;
        bottom: 228px;
      }

      .fab {
        height: 48px;
        padding: 0 15px;
        font-size: 13px;
      }

      .modal-card {
        padding: 16px;
        border-radius: 20px;
      }

      .modal-grid {
        grid-template-columns: 1fr;
      }

      .restore-ui-btn {
        top: 12px;
        height: 40px;
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="topbar">
      <div class="topbar-inner">
        <div class="search-row">

  <div class="logo-wrap">
    <img src="revamplex-logo.png" alt="RevampLEX Logo">
  </div>

  <div class="search-box">
    <span>🔍</span>
    <input id="searchInput" type="text" placeholder="Search contractors, jobs, trades, city..." />
  </div>

  <button class="search-btn" id="searchBtn">Search</button>

</div>

        <div class="mode-row">
          <button class="mode-btn active" id="homeownerMode">🏠 Homeowner View</button>
          <button class="mode-btn" id="contractorMode">🛠 Contractor View</button>
        </div>

        <div class="filter-row">
          <select id="tradeFilter" class="filter-select">
            <option value="all">All Trades</option>
            <option>Kitchen Renovation</option>
            <option>Bathroom Renovation</option>
            <option>Additions & Remodeling</option>
            <option>General Contractors</option>
            <option>Carpentry</option>
            <option>Concrete & Masonry</option>
            <option>Decks & Porches</option>
            <option>Doors</option>
            <option>Drywall & Insulation</option>
            <option>Electrical</option>
            <option>Fencing</option>
            <option>Flooring</option>
            <option>Garage Doors</option>
            <option>Glass & Mirrors</option>
            <option>Gutters</option>
            <option>Handyman Services</option>
            <option>HVAC</option>
            <option>Junk Removal</option>
            <option>Land Surveying</option>
            <option>Landscaping</option>
            <option>Lawn Care</option>
            <option>Locksmith</option>
            <option>Painting</option>
            <option>Patios</option>
            <option>Pest Control</option>
            <option>Plumbing</option>
            <option>Pools & Spas</option>
            <option>Pressure Washing</option>
            <option>Roofing</option>
            <option>Septic Systems</option>
            <option>Siding</option>
            <option>Solar</option>
            <option>Sunrooms</option>
            <option>Tile & Stone</option>
            <option>Tree Services</option>
            <option>Water Damage Restoration</option>
            <option>Windows</option>
          </select>

          <select id="distanceFilter" class="filter-select">
            <option value="100">Any Distance</option>
            <option value="5">Within 5 miles</option>
            <option value="10">Within 10 miles</option>
            <option value="25">Within 25 miles</option>
            <option value="50">Within 50 miles</option>
          </select>

          <select id="ratingFilter" class="filter-select">
            <option value="0">Any Rating</option>
            <option value="4.5">4.5+ stars</option>
            <option value="4.0">4.0+ stars</option>
            <option value="3.5">3.5+ stars</option>
          </select>

          <button class="filter-pill active" id="sortDistance">Nearest</button>
          <button class="filter-pill" id="sortRating">Top Rated</button>
          <button class="filter-pill" id="resetFilters">Reset</button>
        </div>
      </div>
    </div>

    <div id="map"></div>

    <button class="restore-ui-btn" id="restoreUiBtn">▲ Show filters & results</button>

    <div class="count-pill" id="resultsCount">0 results</div>
    <div class="status-pill" id="statusPill"></div>

    <div class="fab-wrap" id="fabWrap">
      <button class="fab" id="postJobBtn">➕ Post a Job</button>
      <button class="fab secondary" id="locateBtn">📍 Center Map</button>
    </div>

    <div class="results-shell">
      <div class="results-shell-inner">
        <div class="results-header">
          <div class="results-title" id="resultsTitle">Swipe left ↔ right to browse contractors</div>
          <div class="results-actions">
            <button class="action-btn" id="scrollLeftBtn">‹</button>
            <button class="action-btn" id="scrollRightBtn">›</button>
          </div>
        </div>
        <div class="cards-row" id="cardsRow"></div>
      </div>
    </div>
  </div>

  <div class="modal" id="jobModal">
    <div class="modal-card">
      <div class="modal-head">
        <h2 class="modal-title">Post a Job</h2>
        <button class="close-btn" id="closeJobModal">×</button>
      </div>

      <div class="modal-grid">
        <div class="field full">
          <label class="label" for="jobTitle">Project title</label>
          <input class="input" id="jobTitle" placeholder="Kitchen Renovation" />
        </div>

        <div class="field">
          <label class="label" for="jobTrade">Trade</label>
          <select class="select" id="jobTrade"></select>
        </div>

        <div class="field">
          <label class="label" for="jobBudget">Budget</label>
          <input class="input" id="jobBudget" placeholder="$12,000" />
        </div>

        <div class="field">
          <label class="label" for="jobCustomer">Customer name</label>
          <input class="input" id="jobCustomer" placeholder="John D." />
        </div>

        <div class="field">
          <label class="label" for="jobCity">City</label>
          <input class="input" id="jobCity" placeholder="Hackensack, NJ" />
        </div>

        <div class="field full">
          <label class="label" for="jobDescription">Project description</label>
          <textarea class="textarea" id="jobDescription" placeholder="Describe the project scope, materials, timing, and any special details..."></textarea>
        </div>

      uiCollapsed = false;

    function ensureUIVisible() {
      if (uiCollapsed) expandUI();

    function getCurrentDataset() {
      return currentMode === 'homeowner' ? contractors : jobs;
    }

      return JSON.parse(localStorage.getItem('revampFavorites') || '[]');
    }

    function isFavorite(jobId) {
      return getFavorites().includes(jobId);
    }

    function toggleFavorite(jobId) {
      let favorites = getFavorites();

      if (favorites.includes(jobId)) {
        favorites = favorites.filter(id => id !== jobId);
        showStatus('Removed from favorites');
      } else {
        favorites.push(jobId);
        showStatus('Saved to favorites');
      }

      localStorage.setItem('revampFavorites', JSON.stringify(favorites));
      renderCards(filteredItems);
    }

    function makeIcon(item, isActive) {
      const kind = item.type === 'job' ? 'job' : 'contractor';
      const size = isActive ? 27 : 20;
      const anchor = isActive ? 13.5 : 10;
      return L.divIcon({
        className: '',
        html: `<div class="map-pin ${kind} ${isActive ? 'active' : ''}"></div>`,
        iconSize: [size, size],
        iconAnchor: [anchor, anchor]
      });
    }

    function clearMarkers() {
      markers.forEach(marker => map.removeLayer(marker));
      markers.clear();
    }

    function getPopupHtml(item) {
      if (item.type === 'contractor') {
        return `
          <div>
            <div class="popup-title">${item.name}</div>
            <div class="popup-sub">${item.trade} • ${item.city}</div>
            <div class="popup-sub">⭐ ${item.rating} (${item.reviews} reviews) • ${item.distance} mi</div>
          </div>
        `;
      }

      return `
        <div>
          <div class="popup-title">${item.title}</div>
          <div class="popup-sub">${item.city} • ${item.trade}</div>
          <div class="popup-sub">Posted by ${item.customer} • ⭐ ${item.rating} (${item.reviews} reviews)</div>
        </div>
      `;
    }

    function renderMarkers(items) {
      clearMarkers();

      items.forEach(item => {
        const marker = L.marker([item.lat, item.lng], {
          icon: makeIcon(item, item.id === activeId)
        }).addTo(map);

        marker.bindPopup(getPopupHtml(item));

        marker.on('click', () => {
          ensureUIVisible();
          setActive(item.id, true);
          scrollCardIntoView(item.id);
        });

        markers.set(item.id, marker);
      });

      fitMapToItems(items);
    }

    function fitMapToItems(items) {
      if (!items.length) return;

      const bounds = L.latLngBounds(items.map(item => [item.lat, item.lng]));
      map.fitBounds(bounds, {
        paddingTopLeft: [30, 200],
        paddingBottomRight: [30, 260],
        maxZoom: 13
      });
    }

    function formatCount() {
      const noun = currentMode === 'homeowner' ? 'contractor' : 'job';
      const count = filteredItems.length;
      resultsCount.textContent = `${count} ${noun}${count === 1 ? '' : 's'} found`;
      resultsTitle.textContent = currentMode === 'homeowner'
        ? 'Swipe left ↔ right to browse contractors'
        : 'Swipe left ↔ right to browse customer jobs';
    }

            <button class="mini-btn primary" data-action="message" data-id="${item.id}">Message</button>
          </div>
        </div>
      `;
    }

    function jobCardHtml(item) {
      const fav = isFavorite(item.id);

      return `
        <div class="card-top">
          <div class="card-title-wrap">
            <h3 class="card-title">${item.title}</h3>

          <div class="card-actions">
            <button class="mini-btn secondary" data-action="job-details" data-id="${item.id}">View Job</button>
            <button class="favorite-btn ${fav ? 'active' : ''}" data-action="favorite" data-id="${item.id}" title="Save to favorites">
              ${fav ? '❤️' : '🤍'}

            <button class="mini-btn primary" data-action="bid" data-id="${item.id}">Submit Bid</button>
          </div>
        </div>
      `;
    }

    function renderCards(items) {
      if (!items.length) {
        cardsRow.innerHTML = `
          <div class="listing-card" style="display:flex;align-items:center;justify-content:center;">
            <div style="padding:24px;text-align:center;">
              <div style="font-size:18px;font-weight:900;margin-bottom:8px;">No results found</div>
              <div style="font-size:14px;color:#64748b;">Try changing the search or filter settings.</div>
            </div>
          </div>
        `;
        return;
      }

      cardsRow.innerHTML = items.map(item => `
        <div class="listing-card ${item.id === activeId ? 'active' : ''}" data-id="${item.id}">
          ${item.type === 'contractor' ? contractorCardHtml(item) : jobCardHtml(item)}
        </div>
      `).join('');
    }

    function updateMarkerStates() {
      filteredItems.forEach(item => {
        const marker = markers.get(item.id);
        if (!marker) return;
        marker.setIcon(makeIcon(item, item.id === activeId));
        if (item.id === activeId) marker.openPopup();
      });
    }

    function setActive(id, panMap = false) {
      activeId = id;

      document.querySelectorAll('.listing-card[data-id]').forEach(card => {
        card.classList.toggle('active', Number(card.dataset.id) === id);
      });

      updateMarkerStates();

      const item = filteredItems.find(entry => entry.id === id);
      if (item && panMap) {
        map.flyTo([item.lat, item.lng], Math.max(map.getZoom(), 13), { duration: 0.45 });
      }
    }

    function scrollCardIntoView(id) {
      const target = [...document.querySelectorAll('.listing-card[data-id]')].find(card => Number(card.dataset.id) === id);
      if (!target) return;

      const left = target.offsetLeft - (cardsRow.clientWidth / 2) + (target.clientWidth / 2);
      cardsRow.scrollTo({ left, behavior: 'smooth' });
    }

    function sortItems(items) {
      if (activeSort === 'distance') {
        items.sort((a, b) => a.distance - b.distance);
      } else {
        items.sort((a, b) => b.rating - a.rating);
      }
    }

    function applyFilters() {
      const source = getCurrentDataset();
      const query = searchInput.value.trim().toLowerCase();
      const selectedTrade = tradeFilter.value;
      const maxDistance = Number(distanceFilter.value);
      const minRating = Number(ratingFilter.value);

      filteredItems = source.filter(item => {
        const haystack = item.type === 'contractor'
          ? [item.name, item.trade, item.city, ...(item.tags || [])].join(' ').toLowerCase()
          : [item.title, item.trade, item.city, item.customer, item.description].join(' ').toLowerCase();

        const matchesQuery = !query || haystack.includes(query);
        const matchesTrade = selectedTrade === 'all' || item.trade === selectedTrade;
        const matchesDistance = item.distance <= maxDistance;
        const matchesRating = item.rating >= minRating;

        return matchesQuery && matchesTrade && matchesDistance && matchesRating;
      });

      sortItems(filteredItems);

      if (!filteredItems.some(item => item.id === activeId)) {
        activeId = filteredItems[0]?.id ?? null;
      }

      renderCards(filteredItems);
      renderMarkers(filteredItems);
      formatCount();

      if (activeId) {
        setActive(activeId, false);
        setTimeout(() => scrollCardIntoView(activeId), 80);
      }
    }

    function setSort(type) {
      activeSort = type;
      sortDistanceBtn.classList.toggle('active', type === 'distance');
      sortRatingBtn.classList.toggle('active', type === 'rating');
      applyFilters();
    }

    function openJobModal() {
      ensureUIVisible();
      jobModal.classList.add('show');
    }

    function closeJobForm() {
      jobModal.classList.remove('show');

    function getFormattedBudget(value) {
      const trimmed = String(value || '').trim();
      if (!trimmed) return '$0';
      return trimmed.startsWith('$') ? trimmed : `$${trimmed}`;
    }

    function createJobFromForm() {
      const title = document.getElementById('jobTitle').value.trim() || 'New Job';
      const trade = document.getElementById('jobTrade').value;
      const budget = getFormattedBudget(document.getElementById('jobBudget').value);
      const customer = document.getElementById('jobCustomer').value.trim() || 'New Customer';
      const city = document.getElementById('jobCity').value.trim() || 'North Jersey, NJ';
      const description = document.getElementById('jobDescription').value.trim() || 'Customer posted a new project on Revamp.';
      const center = map.getCenter();

      jobs.unshift({
        id: Date.now(),
        type: 'job',
        title,
        trade,
        city,
        lat: Number(center.lat.toFixed(6)),
        lng: Number(center.lng.toFixed(6)),
        budget,
        rating: 5.0,
        reviews: 1,
        distance: 1.0,
        customer,
        verified: true,
        postedAgo: 'Just now',
        description,
        bids: []
      });

      currentMode = 'contractor';
      homeownerModeBtn.classList.remove('active');
      contractorModeBtn.classList.add('active');

      closeJobForm();
      clearJobForm();
      applyFilters();
      ensureUIVisible();
      showStatus('Job posted and now visible in Contractor View');
    }

    function clearJobForm() {
      document.getElementById('jobTitle').value = '';
      document.getElementById('jobBudget').value = '';
      document.getElementById('jobCustomer').value = '';
      document.getElementById('jobCity').value = '';
      document.getElementById('jobDescription').value = '';
      document.getElementById('jobTrade').selectedIndex = 0;
    }

  
function openProjectRoom(jobId) {

  const job = jobs.find(entry => entry.id === jobId);

  if (job) {
    sessionStorage.setItem('revampSelectedJob', JSON.stringify(job));
  }

  window.location.href = `project-room.html?job=${jobId}`;

}

    function openDetailModal(item) {
      if (!item) return;

      ensureUIVisible();
      detailModal.classList.add('show');

      if (item.type === 'contractor') {
        detailTitle.textContent = item.name;
        detailContent.innerHTML = `
          <div class="detail-panel">
            <h4>${item.trade} • ${item.city}</h4>
            <p>${item.bio}</p>
          </div>
          <div class="modal-grid">
            <div class="detail-panel">
              <h4>Reputation</h4>
              <p>⭐ ${item.rating} rating with ${item.reviews} reviews.</p>
            </div>
            <div class="detail-panel">
              <h4>Performance</h4>
              <p>${item.projectsCompleted} completed projects and average response time of ${item.responseTime}.</p>
            </div>
          </div>
          <div class="detail-panel">
            <h4>Qualifications</h4>
            <p>${item.licensed ? 'Licensed' : 'Unlicensed'} • ${item.insured ? 'Insured' : 'Not insured'} • Budget tier ${item.price}</p>
          </div>
          <div class="detail-panel">
            <h4>Specialties</h4>
            <div class="badge-row">${item.tags.map(tag => `<span class="badge">${tag}</span>`).join('')}</div>
          </div>
          <div class="card-actions">
            <button class="mini-btn primary" data-action="message" data-id="${item.id}">Message</button>
            <button class="mini-btn secondary" id="detailCloseSecondary">Close</button>
          </div>
        `;
      } else {
        const fav = isFavorite(item.id);

        detailTitle.textContent = item.title;
        detailContent.innerHTML = `
          <div class="detail-panel">
            <h4>${item.trade} • ${item.city}</h4>
            <p>${item.description}</p>
          </div>

          <div class="modal-grid">
            <div class="detail-panel">
              <h4>Customer</h4>
              <p>${item.customer} • ⭐ ${item.rating} (${item.reviews} reviews) • ${item.verified ? 'Verified customer' : 'Unverified customer'}</p>
            </div>
            <div class="detail-panel">
              <h4>Budget</h4>
              <p>${item.budget} • Posted ${item.postedAgo} • Approx. ${item.distance} miles away.</p>
            </div>
          </div>

          <div class="detail-panel">
            <h4>Bidding</h4>
            <p>Bids are submitted privately to the customer. Other contractors cannot see your bid.</p>
          </div>

          <div class="card-actions">
            <button class="mini-btn secondary" data-action="favorite" data-id="${item.id}">
              ${fav ? '❤️ Favorited' : '🤍 Favorite'}
            </button>
            <button class="mini-btn primary" data-action="bid" data-id="${item.id}">
              Submit Bid
            </button>
          </div>
        `;
      }

      const closeSecondary = document.getElementById('detailCloseSecondary');
      if (closeSecondary) {
        closeSecondary.addEventListener('click', closeDetails);
      }
    }

    function closeDetails() {
      detailModal.classList.remove('show');
    }

    function handleCardAction(action, id) {
      const item = [...contractors, ...jobs].find(entry => entry.id === id);
      if (!item) return;

      if (action === 'view' || action === 'job-details') {
        openDetailModal(item);
        return;
      }

      if (action === 'message') {
        showStatus(`Message opened for ${item.name || item.title}`);
        return;
      }

      if (action === 'bid') {
        openProjectRoom(id);
        return;
      }

      if (action === 'favorite') {
        toggleFavorite(id);
        if (detailModal.classList.contains('show') && item.type === 'job') {
          openDetailModal(item);
        }
      }
    }

    function setMode(mode) {
      currentMode = mode;
      homeownerModeBtn.classList.toggle('active', mode === 'homeowner');
      contractorModeBtn.classList.toggle('active', mode === 'contractor');
      applyFilters();
      ensureUIVisible();
    }

    searchBtn.addEventListener('click', () => {
      applyFilters();
      ensureUIVisible();
    });

    searchInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        applyFilters();
        ensureUIVisible();
      }
    });

    tradeFilter.addEventListener('change', () => {
      applyFilters();
      ensureUIVisible();
    });

    distanceFilter.addEventListener('change', () => {
      applyFilters();
      ensureUIVisible();
    });

    ratingFilter.addEventListener('change', () => {
      applyFilters();
      ensureUIVisible();
    });

    sortDistanceBtn.addEventListener('click', () => setSort('distance'));
    sortRatingBtn.addEventListener('click', () => setSort('rating'));

    resetFiltersBtn.addEventListener('click', () => {
      searchInput.value = '';
      tradeFilter.value = 'all';
      distanceFilter.value = '100';
      ratingFilter.value = '0';
      setSort('distance');
      ensureUIVisible();
    });

    homeownerModeBtn.addEventListener('click', () => setMode('homeowner'));
    contractorModeBtn.addEventListener('click', () => setMode('contractor'));

    scrollLeftBtn.addEventListener('click', () => {
      ensureUIVisible();
      cardsRow.scrollBy({ left: -340, behavior: 'smooth' });
    });

    scrollRightBtn.addEventListener('click', () => {
      ensureUIVisible();
      cardsRow.scrollBy({ left: 340, behavior: 'smooth' });
    });

    locateBtn.addEventListener('click', () => {
      fitMapToItems(filteredItems);
      ensureUIVisible();
      showStatus('Map recentered');
    });

    postJobBtn.addEventListener('click', openJobModal);
    closeJobModal.addEventListener('click', closeJobForm);
    cancelJobBtn.addEventListener('click', closeJobForm);
    submitJobBtn.addEventListener('click', createJobFromForm);

    restoreUiBtn.addEventListener('click', expandUI);

    closeDetailModal.addEventListener('click', closeDetails);

    detailModal.addEventListener('click', e => {
      if (e.target === detailModal) closeDetails();
    });

    jobModal.addEventListener('click', e => {
      if (e.target === jobModal) closeJobForm();
    });

    cardsRow.addEventListener('click', e => {
      const button = e.target.closest('[data-action]');

      if (button) {
        e.preventDefault();
        e.stopPropagation();

        const action = button.dataset.action;
        const id = Number(button.dataset.id);
        handleCardAction(action, id);
        return;
      }

      const card = e.target.closest('.listing-card[data-id]');
      if (card) {
        setActive(Number(card.dataset.id), true);
      }
    });

    detailContent.addEventListener('click', e => {
      const button = e.target.closest('[data-action]');
      if (!button) return;

      e.preventDefault();
      e.stopPropagation();

      const action = button.dataset.action;
      const id = Number(button.dataset.id);
      handleCardAction(action, id);
    });

    cardsRow.addEventListener('touchstart', ensureUIVisible, { passive: true });
    cardsRow.addEventListener('mousedown', ensureUIVisible);
    searchInput.addEventListener('focus', ensureUIVisible);

    let scrollTimer = null;
    cardsRow.addEventListener('scroll', () => {
      clearTimeout(scrollTimer);
      scrollTimer = setTimeout(() => {
        const cards = [...document.querySelectorAll('.listing-card[data-id]')];
        if (!cards.length) return;

        const rowRect = cardsRow.getBoundingClientRect();
        const rowCenter = rowRect.left + rowRect.width / 2;

        let closestId = null;
        let closestDiff = Infinity;

        cards.forEach(card => {
          const rect = card.getBoundingClientRect();
          const center = rect.left + rect.width / 2;
          const diff = Math.abs(center - rowCenter);

          if (diff < closestDiff) {
            closestDiff = diff;
            closestId = Number(card.dataset.id);
          }
        });

        if (closestId !== null && closestId !== activeId) {
          setActive(closestId, true);
        }
      }, 70);
    });

    map.on('click', () => {
      if (!uiCollapsed) {
        collapseUI();
      } else {
        expandUI();
      }
    });

    window.addEventListener('resize', () => {
      setTimeout(() => {
        if (filteredItems.length) {
          fitMapToItems(filteredItems);
          if (activeId) scrollCardIntoView(activeId);
        }
      }, 120);
    });

    populateTradeSelect();
    activeId = contractors[0].id;
    applyFilters();
  </script>
</body>
</html>
