<!DOCTYPE html>
<html>

<head>
<meta charset="utf-8">
<title>Revamplex Job Map</title>

<link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet"/>

<style>

body{
margin:0;
font-family:Arial;
display:flex;
height:100vh;
overflow:hidden;
background:#f4f6f8;
}

/* LEFT PANEL */

#sidebar{
width:340px;
background:white;
border-right:1px solid #ddd;
display:flex;
flex-direction:column;
}

/* HEADER */

#sidebar-header{
padding:16px;
border-bottom:1px solid #eee;
background:#fafafa;
}

#sidebar-header h2{
margin:0 0 10px 0;
font-size:20px;
}

/* RADIUS CONTROL */

#radius{
font-size:16px;
padding:6px 10px;
border-radius:6px;
border:1px solid #ccc;
width:100%;
}

/* JOB LIST */

#job-list{
flex:1;
overflow-y:auto;
padding:12px;
}

/* JOB CARDS */

.job-card{
background:white;
padding:16px;
margin-bottom:14px;
border-radius:12px;
box-shadow:0 6px 18px rgba(0,0,0,0.15);
cursor:pointer;
transition:all .2s;
}

.job-card:hover{
transform:translateY(-3px);
box-shadow:0 10px 28px rgba(0,0,0,0.2);
}

.job-title{
font-weight:bold;
font-size:20px;
margin-bottom:6px;
}

.job-desc{
font-size:15px;
color:#555;
}

.job-budget{
color:#2a7ae2;
font-size:18px;
margin-top:8px;
font-weight:bold;
}

/* MAP */

#map{
flex:1;
}

/* MARKERS */

.job-marker{
width:38px;
height:38px;
background:#ff4d4d;
border-radius:50%;
border:4px solid white;
box-shadow:0 0 10px rgba(0,0,0,0.45);
cursor:pointer;
}

/* POPUPS */

.mapboxgl-popup-content{
font-size:18px;
padding:18px;
border-radius:10px;
max-width:260px;
}

.mapboxgl-popup-content h3{
font-size:22px;
margin:0 0 8px 0;
}

.mapboxgl-popup-content p{
font-size:16px;
margin:0 0 6px 0;
}

.mapboxgl-popup-content strong{
font-size:20px;
color:#2a7ae2;
}

/* MOBILE */

@media(max-width:768px){

body{
flex-direction:column;
}

#sidebar{
width:100%;
height:40%;
}

#map{
height:60%;
}

}

</style>

</head>

<body>

<div id="sidebar">

<div id="sidebar-header">

<h2>Available Jobs</h2>

<select id="radius" onchange="updateRadius()">
<option value="10">10 miles</option>
<option value="25" selected>25 miles</option>
<option value="50">50 miles</option>
</select>

</div>

<div id="job-list"></div>

</div>

<div id="map"></div>

<script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>

<script>

const MAPBOX_TOKEN = "pk.eyJ1IjoicmV2YW1wbGV4IiwiYSI6ImNtbWp0YjZyejE2c2gyd3Bucml6YTMzYzMifQ.qIuzgtSyYxQhR97_SvmNJw";

const SUPABASE_URL = "https://dezvwoedboikshqttdqu.supabase.co";

const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRlenZ3b2VkYm9pa3NocXR0ZHF1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwMDMzNzQsImV4cCI6MjA4ODU3OTM3NH0.5SGfJadjBug9oDOrdvjIM36SwFxe1_yzpry0q67iM-E";

mapboxgl.accessToken = MAPBOX_TOKEN;

const map = new mapboxgl.Map({
container:"map",
style:"mapbox://styles/mapbox/streets-v11",
center:[-74.0431,40.7376],
zoom:11
});

let contractorLatitude;
let contractorLongitude;
let markers=[];

/* GET LOCATION */

navigator.geolocation.getCurrentPosition(position=>{

contractorLatitude = position.coords.latitude;
contractorLongitude = position.coords.longitude;

map.flyTo({
center:[contractorLongitude,contractorLatitude],
zoom:11
});

loadJobs();

});

/* DISTANCE */

function getDistance(lat1,lon1,lat2,lon2){

const R = 3958.8;

const dLat = (lat2-lat1)*Math.PI/180;
const dLon = (lon2-lon1)*Math.PI/180;

const a =
Math.sin(dLat/2)*Math.sin(dLat/2)+
Math.cos(lat1*Math.PI/180)*
Math.cos(lat2*Math.PI/180)*
Math.sin(dLon/2)*Math.sin(dLon/2);

const c = 2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));

return R*c;

}

/* LOAD JOBS */

async function loadJobs(){

markers.forEach(m=>m.remove());
markers=[];

document.getElementById("job-list").innerHTML="";

const response = await fetch(`${SUPABASE_URL}/rest/v1/Jobs?select=*`,{
headers:{
apikey:SUPABASE_KEY,
Authorization:`Bearer ${SUPABASE_KEY}`,
"Accept-Profile":"public"
}
});

const jobs = await response.json();

const radius = Number(document.getElementById("radius").value);

jobs.forEach(job=>{

const distance = getDistance(
contractorLatitude,
contractorLongitude,
job.latitude,
job.longitude
);

if(distance>radius) return;

/* MARKER */

const el=document.createElement("div");
el.className="job-marker";

const popupContent=`
<h3>${job.Title}</h3>
<p>${job.Description}</p>
<strong>${job.Budget}</strong>
`;

const marker=new mapboxgl.Marker(el)
.setLngLat([job.longitude,job.latitude])
.setPopup(new mapboxgl.Popup().setHTML(popupContent))
.addTo(map);

markers.push(marker);

/* JOB CARD */

const card=document.createElement("div");
card.className="job-card";

card.innerHTML=`
<div class="job-title">${job.Title}</div>
<div class="job-desc">${job.Description}</div>
<div class="job-budget">${job.Budget}</div>
`;

card.onclick=()=>{

map.flyTo({
center:[job.longitude,job.latitude],
zoom:14
});

marker.togglePopup();

};

document.getElementById("job-list").appendChild(card);

});

}

/* UPDATE RADIUS */

function updateRadius(){

const radius = Number(document.getElementById("radius").value);

let zoom=11;

if(radius===10) zoom=13;
if(radius===25) zoom=11;
if(radius===50) zoom=10;

map.flyTo({
center:[contractorLongitude,contractorLatitude],
zoom:zoom
});

loadJobs();

}

</script>

</body>

</html>
