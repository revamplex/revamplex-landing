<!DOCTYPE html>
<html>

<head>
<meta charset="utf-8">
<title>Revamplex Job Map</title>

<link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet" />

<style>
body{

#map{

<body>
<div id="controls">

Radius:

<script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>

<script>
  let contractorLatitude;
let contractorLongitude;

navigator.geolocation.getCurrentPosition(position => {

contractorLatitude = position.coords.latitude;
contractorLongitude = position.coords.longitude;

});
  function getDistance(lat1, lon1, lat2, lon2){

const R = 3958.8; // Earth radius miles

const dLat = (lat2-lat1) * Math.PI / 180;
const dLon = (lon2-lon1) * Math.PI / 180;

const a =
Math.sin(dLat/2) * Math.sin(dLat/2) +
Math.cos(lat1*Math.PI/180) *
Math.cos(lat2*Math.PI/180) *
Math.sin(dLon/2) *
Math.sin(dLon/2);

const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));

return R * c;

}

const MAPBOX_TOKEN = "pk.eyJ1IjoicmV2YW1wbGV4IiwiYSI6ImNtbWp0YjZyejE2c2gyd3Bucml6YTMzYzMifQ.qIuzgtSyYxQhR97_SvmNJw";
const SUPABASE_URL = "https://dezvwoedboikshqttdqu.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRlenZ3b2VkYm9pa3NocXR0ZHF1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwMDMzNzQsImV4cCI6MjA4ODU3OTM3NH0.5SGfJadjBug9oDOrdvjIM36SwFxe1_yzpry0q67iM-E";

mapboxgl.accessToken = MAPBOX_TOKEN;

const map = new mapboxgl.Map({
container: "map",
style: "mapbox://styles/mapbox/streets-v11",
center: [-74.0431,40.7376],
zoom: 12
});

async function loadJobs(){

try{

const response = await fetch(`${SUPABASE_URL}/rest/v1/Jobs?select=*`, {
headers: {
apikey: SUPABASE_KEY,
Authorization: `Bearer ${SUPABASE_KEY}`,
"Accept-Profile": "public"
}
});

const result = await response.json();
const jobs = result.data || result;

console.log("Supabase response:",jobs);

if(!Array.isArray(jobs)){
console.log("Response not an array");
return;
}

jobs.forEach(job => {const radius = document.getElementById("radius").value;

const distance = getDistance(
contractorLatitude,
contractorLongitude,
job.latitude,
job.longitude
);

if(distance > radius){
return;
}
console.log("JOB DATA:", job);
const popupContent = `
<h3>${job.Title}</h3>
<p>${job.Description}</p>
<strong>${job.Budget}</strong>
`;

new mapboxgl.Marker()
.setLngLat([job.longitude, job.latitude])
.setPopup(new mapboxgl.Popup().setHTML(popupContent))
.addTo(map);

});

}catch(error){
console.error("Error loading jobs:",error);
}

}

map.on("load",loadJobs);

</script>
