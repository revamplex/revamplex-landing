/* =========================

const SUPABASE_URL = "https://dezvwoedboikshqttdqu.supabase.co";

const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

/* =========================
   LIVE DATA LOAD
========================= */
async function loadLiveData() {
  try {
    const { data: contractorData } = await supabaseClient
      .from("contractors")
      .select("*");

    const { data: jobData } = await supabaseClient
      .from("jobs_with_bid_counts")
      .select("*")
      .order("created_at", { ascending: false });

    const { data: bidData } = await supabaseClient
      .from("bids")
      .select("*");

    // attach bids to jobs
    const bidsByJob = {};
    (bidData || []).forEach(b => {
      if (!bidsByJob[b.job_id]) bidsByJob[b.job_id] = [];
      bidsByJob[b.job_id].push(b);
    });

    contractors = (contractorData || []).map(c => ({
      ...c,
      type: "contractor"
    }));

    jobs = (jobData || []).map(j => ({
      ...j,
      bids: bidsByJob[j.id] || [],
      type: "job"
    }));

    applyFilters();

  } catch (err) {
    console.error("LIVE LOAD ERROR", err);
  }
}

/* =========================
   REALTIME
========================= */
function subscribeLive() {
  supabaseClient
    .channel("revamp-live")
    .on("postgres_changes", { event: "*", schema: "public", table: "jobs" }, loadLiveData)
    .on("postgres_changes", { event: "*", schema: "public", table: "bids" }, loadLiveData)
    .subscribe();
}

/* =========================
   POST JOB (CONNECTED)
========================= */
async function createJobFromForm() {
  const title = document.getElementById("jobTitle").value;
  const trade = document.getElementById("jobTrade").value;
  const budget = document.getElementById("jobBudget").value;
  const customer = document.getElementById("jobCustomer").value;
  const city = document.getElementById("jobCity").value;
  const description = document.getElementById("jobDescription").value;

  const center = map.getCenter();

  const { error } = await supabaseClient.from("jobs").insert([{
    title,
    trade,
    budget,
    customer_name: customer,
    city,
    description,
    lat: center.lat,
    lng: center.lng,
    max_bids: 5
  }]);

  if (error) {
    alert("Error posting job");
    console.error(error);
    return;
  }

  closeJobForm();
  showStatus("Job posted live 🚀");
  loadLiveData();
}

/* =========================
   BID SYSTEM (CONNECTED)
========================= */
async function submitBid(jobId) {
  const amount = prompt("Enter your bid:");
  if (!amount) return;

  const { error } = await supabaseClient
    .from("bids")
    .insert([{
      job_id: jobId,
      contractor_id: "demo",
      contractor_name: "Verified Contractor",
      amount: amount
    }]);

  if (error) {
    alert("Error submitting bid");
    console.error(error);
    return;
  }

  showStatus("Bid submitted ✅");
  loadLiveData();
}

/* =========================
   PROJECT ROOM (RESTORED)
========================= */
function openProjectRoom(jobId) {
  const job = jobs.find(j => j.id === jobId);
  if (!job) return;

  sessionStorage.setItem("revampSelectedJob", JSON.stringify(job));
  window.location.href = "project-room.html?job=" + jobId;
}

/* =========================
   FIX BUTTON HANDLERS
========================= */
function handleCardAction(action, id) {
  const item = [...contractors, ...jobs].find(x => x.id === id);

  if (!item) return;

  if (action === "bid") {
    submitBid(id);
    return;
  }

  if (action === "job-details") {
    openDetailModal(item);
    return;
  }

  if (action === "project-room") {
    openProjectRoom(id);
    return;
  }
}

/* =========================
   DETAIL MODAL FIX
========================= */
function openDetailModal(item) {
  detailModal.classList.add("show");

  if (item.type === "job") {
    detailTitle.textContent = item.title;

    detailContent.innerHTML = `
      <div class="detail-panel">
        <h4>${item.trade}</h4>
        <p>${item.description}</p>
      </div>

      <div class="detail-panel">
        <h4>Bids (${item.bids.length})</h4>
        ${item.bids.map(b => `
          <div style="margin-top:10px;">
            <strong>${b.contractor_name}</strong><br>
            ${b.amount}
          </div>
        `).join("")}
      </div>

      <div class="card-actions">
        <button class="mini-btn primary" onclick="submitBid(${item.id})">Submit Bid</button>
        <button class="mini-btn secondary" onclick="openProjectRoom(${item.id})">Open Project Room</button>
      </div>
    `;
  }
}

/* =========================
   INIT
========================= */
populateTradeSelect();
syncModeUI();
loadLiveData();
subscribeLive();

</script>
