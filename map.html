<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RevampLEX v7 Stable</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
html,body,#map{height:100%;margin:0;font-family:Arial}
.topbar{
position:absolute;top:10px;left:50%;transform:translateX(-50%);
z-index:1000;background:white;padding:10px 15px;border-radius:10px;
box-shadow:0 4px 12px rgba(0,0,0,.15);
}
.logo{font-weight:bold;font-size:18px}
.logo span{color:#f97316}
.btn{
margin-top:5px;
padding:6px 10px;
background:#f97316;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}
</style>
</head>

<body>

<div class="topbar">
<div class="logo">Revamp<span>LEX</span></div>
<button class="btn" onclick="openPostModal()">Post Job</button>
</div>

<div id="map"></div>

<script>

/* =========================
   SUPABASE
========================= */
const SUPABASE_URL = "https://dezvwoedboikshqttdqu.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRlenZ3b2VkYm9pa3NocXR0ZHF1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwMDMzNzQsImV4cCI6MjA4ODU3OTM3NH0.5SGfJadjBug9oDOrdvjIM36SwFxe1_yzpry0q67iM-E"; // keep yours
const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

/* =========================
   MAP
========================= */
const map = L.map('map').setView([40.8859,-74.0435],11);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map);

let markers = [];

/* =========================
   LOAD LIVE DATA
========================= */
async function loadData(){
clearMarkers();

const {data:jobs} = await supabaseClient.from("jobs").select("*");

if(!jobs) return;

jobs.forEach(job=>{
const marker = L.marker([job.lat,job.lng]).addTo(map);

marker.bindPopup(`
<b>${job.title}</b><br>
${job.city}<br><br>

<button class="btn" onclick="openProjectRoom(${job.id})">
Project Room
</button><br><br>

<button class="btn" onclick="submitBid(${job.id})">
Submit Bid
</button>
`);

markers.push(marker);
});
}

/* =========================
   CLEAR MARKERS
========================= */
function clearMarkers(){
markers.forEach(m=>map.removeLayer(m));
markers=[];
}

/* =========================
   POST JOB
========================= */
function openPostModal(){
const title = prompt("Job Title");
if(!title) return;

const city = prompt("City");
const trade = prompt("Trade");

createJob(title, city, trade);
}

async function createJob(title, city, trade){
const center = map.getCenter();

const {error} = await supabaseClient.from("jobs").insert([{
title,
city,
trade,
lat:center.lat,
lng:center.lng,
budget:"$0",
customer_name:"Demo User",
max_bids:5
}]);

if(error){
alert("Error posting job");
return;
}

alert("Job Posted");
loadData();
}

/* =========================
   BID
========================= */
async function submitBid(jobId){
const amount = prompt("Enter bid amount");
if(!amount) return;

const {error} = await supabaseClient.from("bids").insert([{
job_id:jobId,
contractor_id:"demo",
contractor_name:"Verified Contractor",
amount:amount
}]);

if(error){
alert("Error");
return;
}

alert("Bid submitted");
}

/* =========================
   PROJECT ROOM
========================= */
function openProjectRoom(id){
window.location.href = "project-room.html?job=" + id;
}

/* =========================
   INIT
========================= */
loadData();

</script>

</body>
</html>
