<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />
  <title>Revamp Properties Map</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />

  <style>
    :root {
      --brand: #f97316;
      --brand-dark: #ea580c;
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --border: rgba(15, 23, 42, 0.08);
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.14);
      --shadow-soft: 0 8px 20px rgba(15, 23, 42, 0.10);
      --radius-xl: 22px;
      --radius-lg: 18px;
      --radius-md: 14px;
      --topbar-height: 118px;
      --results-height: 210px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      font-family: Inter, Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    body {
      position: relative;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
      overflow: hidden;
    }

    /* TOP BAR */
    .topbar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      padding: 12px 12px 10px;
      pointer-events: none;
    }

    .topbar-inner {
      pointer-events: auto;
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.7);
      box-shadow: var(--shadow-soft);
      border-radius: 24px;
      padding: 12px;
      max-width: 1100px;
      margin: 0 auto;
    }

    .search-row {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 10px;
    }

    .search-box {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 10px;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 0 14px;
      height: 50px;
      box-shadow: 0 2px 6px rgba(15, 23, 42, 0.04);
    }

    .search-box input {
      border: none;
      outline: none;
      width: 100%;
      background: transparent;
      font-size: 15px;
      color: var(--text);
    }

    .search-btn {
      border: none;
      outline: none;
      height: 50px;
      padding: 0 18px;
      border-radius: 16px;
      background: linear-gradient(135deg, var(--brand), var(--brand-dark));
      color: #fff;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(249, 115, 22, 0.28);
      white-space: nowrap;
    }

    .filter-row {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      scrollbar-width: none;
    }

    .filter-row::-webkit-scrollbar {
      display: none;
    }

    .filter-pill,
    .filter-select {
      height: 42px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text);
      padding: 0 14px;
      font-size: 14px;
      font-weight: 600;
      outline: none;
      cursor: pointer;
      white-space: nowrap;
      flex: 0 0 auto;
      box-shadow: 0 2px 6px rgba(15, 23, 42, 0.04);
    }

    .filter-pill.active {
      background: rgba(249, 115, 22, 0.12);
      border-color: rgba(249, 115, 22, 0.35);
      color: var(--brand-dark);
    }

    /* MAP */
    #map {
      position: absolute;
      inset: 0;
      z-index: 1;
    }

    .leaflet-container {
      width: 100%;
      height: 100%;
      background: #dbeafe;
    }

    /* FLOATING RESULT COUNT */
    .results-count {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      top: calc(var(--topbar-height) + 10px);
      z-index: 900;
      background: rgba(15, 23, 42, 0.82);
      color: #fff;
      padding: 10px 16px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
      backdrop-filter: blur(8px);
      box-shadow: var(--shadow-soft);
      pointer-events: none;
    }

    /* HORIZONTAL BOTTOM RESULTS */
    .results-shell {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 950;
      pointer-events: none;
      padding: 0 0 16px;
    }

    .results-shell-inner {
      pointer-events: none;
      max-width: 1400px;
      margin: 0 auto;
    }

    .results-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px 10px;
      pointer-events: none;
    }

    .results-title {
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.7);
      border-radius: 999px;
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 700;
      box-shadow: var(--shadow-soft);
      pointer-events: auto;
    }

    .results-arrows {
      display: flex;
      gap: 8px;
      pointer-events: auto;
    }

    .arrow-btn {
      width: 42px;
      height: 42px;
      border-radius: 999px;
      border: none;
      background: rgba(255,255,255,0.94);
      box-shadow: var(--shadow-soft);
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      color: var(--text);
    }

    .cards-row {
      display: flex;
      gap: 14px;
      overflow-x: auto;
      overflow-y: hidden;
      padding: 0 16px 6px;
      scroll-snap-type: x mandatory;
      scroll-behavior: smooth;
      scrollbar-width: none;
      pointer-events: auto;
    }

    .cards-row::-webkit-scrollbar {
      display: none;
    }

    .contractor-card {
      flex: 0 0 320px;
      max-width: 320px;
      min-height: 180px;
      background: rgba(255,255,255,0.96);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(255,255,255,0.8);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      scroll-snap-align: center;
      overflow: hidden;
      transition: transform 0.22s ease, box-shadow 0.22s ease, border-color 0.22s ease;
      cursor: pointer;
    }

    .contractor-card.active {
      transform: translateY(-6px);
      box-shadow: 0 18px 38px rgba(249, 115, 22, 0.22);
      border-color: rgba(249, 115, 22, 0.28);
    }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 16px 10px;
    }

    .card-title-wrap {
      min-width: 0;
    }

    .card-name {
      font-size: 18px;
      line-height: 1.2;
      font-weight: 800;
      margin: 0 0 6px;
    }

    .card-sub {
      font-size: 13px;
      color: var(--muted);
      margin: 0;
    }

    .rating-pill {
      background: rgba(15, 23, 42, 0.06);
      color: var(--text);
      border-radius: 999px;
      padding: 8px 10px;
      font-size: 13px;
      font-weight: 800;
      white-space: nowrap;
    }

    .card-body {
      padding: 0 16px 14px;
    }

    .meta-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 12px;
    }

    .meta-box {
      background: #f8fafc;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 10px 12px;
    }

    .meta-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 4px;
      font-weight: 700;
    }

    .meta-value {
      font-size: 14px;
      font-weight: 800;
      color: var(--text);
    }

    .tags {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .tag {
      font-size: 12px;
      font-weight: 700;
      color: var(--brand-dark);
      background: rgba(249, 115, 22, 0.1);
      padding: 7px 10px;
      border-radius: 999px;
    }

    .card-actions {
      display: flex;
      gap: 10px;
    }

    .btn-primary,
    .btn-secondary {
      flex: 1;
      height: 42px;
      border-radius: 14px;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
    }

    .btn-primary {
      border: none;
      color: #fff;
      background: linear-gradient(135deg, var(--brand), var(--brand-dark));
      box-shadow: 0 10px 20px rgba(249, 115, 22, 0.22);
    }

    .btn-secondary {
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text);
    }

    /* CUSTOM MAP PIN */
    .custom-pin {
      width: 20px;
      height: 20px;
      background: var(--brand);
      border: 3px solid #fff;
      border-radius: 50%;
      box-shadow: 0 8px 18px rgba(249, 115, 22, 0.35);
    }

    .custom-pin.active {
      width: 26px;
      height: 26px;
      background: #0f172a;
      border: 4px solid #fff;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.35);
    }

    /* MAP POPUP */
    .leaflet-popup-content-wrapper {
      border-radius: 16px;
      box-shadow: var(--shadow-soft);
    }

    .leaflet-popup-content {
      margin: 14px 16px;
      font-family: Inter, Arial, Helvetica, sans-serif;
    }

    .popup-name {
      font-size: 15px;
      font-weight: 800;
      margin-bottom: 6px;
    }

    .popup-meta {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 4px;
    }

    @media (max-width: 900px) {
      :root {
        --topbar-height: 122px;
      }

      .topbar {
        padding: 10px 10px 8px;
      }

      .topbar-inner {
        padding: 10px;
        border-radius: 20px;
      }

      .search-row {
        margin-bottom: 8px;
      }

      .search-btn {
        padding: 0 15px;
      }

      .contractor-card {
        flex: 0 0 290px;
        max-width: 290px;
      }
    }

    @media (max-width: 640px) {
      :root {
        --topbar-height: 128px;
      }

      .search-row {
        gap: 8px;
      }

      .search-box,
      .search-btn {
        height: 48px;
      }

      .search-btn {
        font-size: 14px;
      }

      .filter-pill,
      .filter-select {
        height: 40px;
        font-size: 13px;
      }

      .results-count {
        top: calc(var(--topbar-height) + 8px);
        font-size: 12px;
        padding: 9px 14px;
      }

      .results-header {
        padding: 0 12px 8px;
      }

      .cards-row {
        padding: 0 12px 6px;
        gap: 12px;
      }

      .contractor-card {
        flex: 0 0 84vw;
        max-width: 84vw;
        min-height: 176px;
      }

      .card-name {
        font-size: 17px;
      }

      .meta-grid {
        gap: 8px;
      }

      .btn-primary,
      .btn-secondary {
        height: 40px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <!-- TOP FILTER BAR -->
    <div class="topbar">
      <div class="topbar-inner">
        <div class="search-row">
          <div class="search-box">
            <span>🔍</span>
            <input
              id="searchInput"
              type="text"
              placeholder="Search contractors, trades, city..."
            />
          </div>
          <button class="search-btn" id="searchBtn">Search</button>
        </div>

        <div class="filter-row">
          <select id="tradeFilter" class="filter-select">
            <option value="all">All Trades</option>
            <option value="Carpentry">Carpentry</option>
            <option value="Plumbing">Plumbing</option>
            <option value="Electrical">Electrical</option>
            <option value="HVAC">HVAC</option>
            <option value="Painting">Painting</option>
            <option value="Masonry">Masonry</option>
            <option value="Roofing">Roofing</option>
            <option value="Flooring">Flooring</option>
            <option value="Drywall">Drywall</option>
            <option value="Siding">Siding</option>
            <option value="Landscaping">Landscaping</option>
            <option value="Glazing">Glazing</option>
            <option value="Cabinetry">Cabinetry</option>
            <option value="Handyman">Handyman</option>
          </select>

          <select id="distanceFilter" class="filter-select">
            <option value="100">Any Distance</option>
            <option value="5">Within 5 miles</option>
            <option value="10">Within 10 miles</option>
            <option value="25">Within 25 miles</option>
            <option value="50">Within 50 miles</option>
          </select>

          <select id="ratingFilter" class="filter-select">
            <option value="0">Any Rating</option>
            <option value="4.5">4.5+ stars</option>
            <option value="4.0">4.0+ stars</option>
            <option value="3.5">3.5+ stars</option>
          </select>

          <button class="filter-pill active" id="sortDistance">Nearest</button>
          <button class="filter-pill" id="sortRating">Top Rated</button>
          <button class="filter-pill" id="resetFilters">Reset</button>
        </div>
      </div>
    </div>

    <!-- MAP -->
    <div id="map"></div>

    <!-- RESULT COUNT -->
    <div class="results-count" id="resultsCount">0 contractors found</div>

    <!-- BOTTOM HORIZONTAL RESULTS -->
    <div class="results-shell">
      <div class="results-shell-inner">
        <div class="results-header">
          <div class="results-title">Swipe left ↔ right to browse results</div>
          <div class="results-arrows">
            <button class="arrow-btn" id="scrollLeftBtn">‹</button>
            <button class="arrow-btn" id="scrollRightBtn">›</button>
          </div>
        </div>
        <div class="cards-row" id="cardsRow"></div>
      </div>
    </div>
  </div>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>

  <script>
    /***************************************************************
     * REPLACE THIS ARRAY WITH YOUR REAL CONTRACTOR DATA
     * You can later pull this from Supabase / API / database.
     ***************************************************************/
    const contractors = [
      {
        id: 1,
        name: "Elite Plumbing & Drain",

        rating: 4.9,
        distance: 2.3,
        city: "Hackensack, NJ",

      },
      {

      },
      {

        lat: 40.9445,

      },
      {
        id: 4,
        name: "Metro Tile & Flooring",
        trade: "Flooring",
        rating: 4.6,
        distance: 4.4,
        city: "Lodi, NJ",
        lat: 40.8765,
        lng: -74.0835,
        price: "$$",
        tags: ["Tile", "Hardwood", "Vinyl"]
      },
      {
        id: 5,
        name: "Garden State Carpentry",
        trade: "Carpentry",
        rating: 4.9,
        distance: 7.5,
        city: "Ridgefield Park, NJ",
        lat: 40.8579,
        lng: -74.0229,
        price: "$$$",
        tags: ["Trim", "Framing", "Finish Work"]
      },
      {
        id: 6,
        name: "Everest HVAC Systems",
        trade: "HVAC",
        rating: 4.5,
        distance: 9.1,
        city: "Fort Lee, NJ",
        lat: 40.8509,
        lng: -73.9701,
        price: "$$$",
        tags: ["Heating", "Cooling", "Mini Splits"]
      },
      {
        id: 7,
        name: "Hudson Drywall & Insulation",
        trade: "Drywall",
        rating: 4.4,
        distance: 5.8,
        city: "Clifton, NJ",
        lat: 40.8584,
        lng: -74.1638,
        price: "$$",
        tags: ["Sheetrock", "Taping", "Insulation"]
      },
      {
        id: 8,
        name: "Masonry Masters NJ",
        trade: "Masonry",
        rating: 4.8,
        distance: 8.7,
        city: "Fair Lawn, NJ",
        lat: 40.9404,
        lng: -74.1318,
        price: "$$$",
        tags: ["Block", "Brick", "Concrete"]
      },
      {
        id: 9,
        name: "Orange Ladder Handyman",
        trade: "Handyman",
        rating: 4.3,
        distance: 2.9,
        city: "Bogota, NJ",
        lat: 40.8759,
        lng: -74.0299,
        price: "$",
        tags: ["Repairs", "Punch List", "Installations"]
      },
      {
        id: 10,
        name: "Prime Cabinet Studio",
        trade: "Cabinetry",
        rating: 4.7,
        distance: 10.4,
        city: "Englewood, NJ",
        lat: 40.8929,
        lng: -73.9726,
        price: "$$$",
        tags: ["Kitchen", "Bath", "Custom Millwork"]
      }
    ];

    let filteredContractors = [...contractors];
    let activeCardId = null;
    let activeSort = "distance";
    const markers = new Map();

    // MAP SETUP
    const map = L.map("map", {
      zoomControl: false,
      attributionControl: true
    }).setView([40.8859, -74.0435], 11);

    L.control.zoom({ position: "bottomright" }).addTo(map);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
      attribution: "&copy; OpenStreetMap contributors"
    }).addTo(map);

    const cardsRow = document.getElementById("cardsRow");
    const resultsCount = document.getElementById("resultsCount");
    const searchInput = document.getElementById("searchInput");
    const searchBtn = document.getElementById("searchBtn");
    const tradeFilter = document.getElementById("tradeFilter");
    const distanceFilter = document.getElementById("distanceFilter");
    const ratingFilter = document.getElementById("ratingFilter");
    const sortDistanceBtn = document.getElementById("sortDistance");
    const sortRatingBtn = document.getElementById("sortRating");
    const resetFiltersBtn = document.getElementById("resetFilters");
    const scrollLeftBtn = document.getElementById("scrollLeftBtn");
    const scrollRightBtn = document.getElementById("scrollRightBtn");

    function createPinHTML(isActive = false) {
      return `<div class="custom-pin ${isActive ? "active" : ""}"></div>`;
    }

    function clearMarkers() {
      markers.forEach(marker => map.removeLayer(marker));
      markers.clear();
    }

    function renderMarkers(data) {
      clearMarkers();

      data.forEach(item => {
        const icon = L.divIcon({
          className: "",
          html: createPinHTML(item.id === activeCardId),
          iconSize: item.id === activeCardId ? [26, 26] : [20, 20],
          iconAnchor: item.id === activeCardId ? [13, 13] : [10, 10]
        });

        const marker = L.marker([item.lat, item.lng], { icon }).addTo(map);

        marker.bindPopup(`
          <div>
            <div class="popup-name">${item.name}</div>
            <div class="popup-meta">${item.trade} • ${item.city}</div>
            <div class="popup-meta">⭐ ${item.rating} • ${item.distance} miles away</div>
          </div>
        `);

        marker.on("click", () => {
          setActiveCard(item.id, true);
          scrollCardIntoView(item.id);
        });

        markers.set(item.id, marker);
      });

      fitMapToVisibleResults();
    }

    function fitMapToVisibleResults() {
      if (!filteredContractors.length) return;

      const bounds = L.latLngBounds(
        filteredContractors.map(item => [item.lat, item.lng])
      );

      map.fitBounds(bounds, {
        paddingTopLeft: [30, 140],
        paddingBottomRight: [30, 260],
        maxZoom: 13
      });
    }

    function renderCards(data) {
      cardsRow.innerHTML = "";

      if (!data.length) {
        cardsRow.innerHTML = `
          <div class="contractor-card" style="flex: 0 0 340px; display:flex; align-items:center; justify-content:center;">
            <div style="padding:24px; text-align:center;">
              <div style="font-size:18px; font-weight:800; margin-bottom:8px;">No contractors found</div>
              <div style="font-size:14px; color:#64748b;">Try changing the search or filters.</div>
            </div>
          </div>
        `;
        return;
      }

      data.forEach(item => {
        const card = document.createElement("div");
        card.className = "contractor-card";
        card.dataset.id = item.id;

        if (item.id === activeCardId) {
          card.classList.add("active");
        }

        card.innerHTML = `
          <div class="card-top">
            <div class="card-title-wrap">
              <h3 class="card-name">${item.name}</h3>
              <p class="card-sub">${item.trade} • ${item.city}</p>
            </div>
            <div class="rating-pill">⭐ ${item.rating}</div>
          </div>

          <div class="card-body">
            <div class="meta-grid">
              <div class="meta-box">
                <div class="meta-label">Distance</div>
                <div class="meta-value">${item.distance} mi</div>
              </div>
              <div class="meta-box">
                <div class="meta-label">Budget</div>
                <div class="meta-value">${item.price}</div>
              </div>
            </div>

            <div class="tags">
              ${item.tags.map(tag => `<span class="tag">${tag}</span>`).join("")}
            </div>

            <div class="card-actions">
              <button class="btn-primary">View Profile</button>
              <button class="btn-secondary">Message</button>
            </div>
          </div>
        `;

        card.addEventListener("click", () => {
          setActiveCard(item.id, true);
        });

        cardsRow.appendChild(card);
      });
    }

    function updateResultsCount() {
      const count = filteredContractors.length;
      resultsCount.textContent = `${count} contractor${count === 1 ? "" : "s"} found`;
    }

    function setActiveCard(id, panMap = false) {
      activeCardId = id;

      document.querySelectorAll(".contractor-card").forEach(card => {
        card.classList.toggle("active", Number(card.dataset.id) === id);
      });

      filteredContractors.forEach(item => {
        const marker = markers.get(item.id);
        if (!marker) return;

        const isActive = item.id === id;
        const icon = L.divIcon({
          className: "",
          html: createPinHTML(isActive),
          iconSize: isActive ? [26, 26] : [20, 20],
          iconAnchor: isActive ? [13, 13] : [10, 10]
        });
        marker.setIcon(icon);

        if (isActive) {
          marker.openPopup();
          if (panMap) {
            map.flyTo([item.lat, item.lng], Math.max(map.getZoom(), 13), {
              duration: 0.5
            });
          }
        } else {
          marker.closePopup();
        }
      });
    }

    function scrollCardIntoView(id) {
      const targetCard = [...document.querySelectorAll(".contractor-card")].find(
        card => Number(card.dataset.id) === id
      );
      if (!targetCard) return;

      const left =
        targetCard.offsetLeft -
        (cardsRow.clientWidth / 2) +
        (targetCard.clientWidth / 2);

      cardsRow.scrollTo({
        left,
        behavior: "smooth"
      });
    }

    function applyFilters() {
      const searchTerm = searchInput.value.trim().toLowerCase();
      const selectedTrade = tradeFilter.value;
      const maxDistance = Number(distanceFilter.value);
      const minRating = Number(ratingFilter.value);

      filteredContractors = contractors.filter(item => {
        const matchesSearch =
          !searchTerm ||
          item.name.toLowerCase().includes(searchTerm) ||
          item.trade.toLowerCase().includes(searchTerm) ||
          item.city.toLowerCase().includes(searchTerm) ||
          item.tags.some(tag => tag.toLowerCase().includes(searchTerm));

        const matchesTrade =
          selectedTrade === "all" || item.trade === selectedTrade;

        const matchesDistance = item.distance <= maxDistance;
        const matchesRating = item.rating >= minRating;

        return matchesSearch && matchesTrade && matchesDistance && matchesRating;
      });

      if (activeSort === "distance") {
        filteredContractors.sort((a, b) => a.distance - b.distance);
      } else if (activeSort === "rating") {
        filteredContractors.sort((a, b) => b.rating - a.rating);
      }

      if (!filteredContractors.some(item => item.id === activeCardId)) {
        activeCardId = filteredContractors.length ? filteredContractors[0].id : null;
      }

      renderCards(filteredContractors);
      renderMarkers(filteredContractors);
      updateResultsCount();

      if (activeCardId) {
        setActiveCard(activeCardId, false);
        setTimeout(() => scrollCardIntoView(activeCardId), 100);
      }
    }

    function setSort(type) {
      activeSort = type;

      sortDistanceBtn.classList.toggle("active", type === "distance");
      sortRatingBtn.classList.toggle("active", type === "rating");

      applyFilters();
    }

    // Detect centered card while user scrolls horizontally
    let scrollTimeout = null;
    cardsRow.addEventListener("scroll", () => {
      if (scrollTimeout) clearTimeout(scrollTimeout);

      scrollTimeout = setTimeout(() => {
        const cards = [...document.querySelectorAll(".contractor-card[data-id]")];
        if (!cards.length) return;

        const rowRect = cardsRow.getBoundingClientRect();
        const rowCenter = rowRect.left + rowRect.width / 2;

        let closestCard = null;
        let closestDistance = Infinity;

        cards.forEach(card => {
          const rect = card.getBoundingClientRect();
          const cardCenter = rect.left + rect.width / 2;
          const diff = Math.abs(rowCenter - cardCenter);

          if (diff < closestDistance) {
            closestDistance = diff;
            closestCard = card;
          }
        });

        if (closestCard) {
          const id = Number(closestCard.dataset.id);
          if (id !== activeCardId) {
            setActiveCard(id, true);
          }
        }
      }, 80);
    });

    // Button events
    searchBtn.addEventListener("click", applyFilters);
    searchInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") applyFilters();
    });

    tradeFilter.addEventListener("change", applyFilters);
    distanceFilter.addEventListener("change", applyFilters);
    ratingFilter.addEventListener("change", applyFilters);

    sortDistanceBtn.addEventListener("click", () => setSort("distance"));
    sortRatingBtn.addEventListener("click", () => setSort("rating"));

    resetFiltersBtn.addEventListener("click", () => {
      searchInput.value = "";
      tradeFilter.value = "all";
      distanceFilter.value = "100";
      ratingFilter.value = "0";
      setSort("distance");
    });

    scrollLeftBtn.addEventListener("click", () => {
      cardsRow.scrollBy({ left: -340, behavior: "smooth" });
    });

    scrollRightBtn.addEventListener("click", () => {
      cardsRow.scrollBy({ left: 340, behavior: "smooth" });
    });

    // Initial render
    activeCardId = contractors[0]?.id || null;
    applyFilters();

    // Better mobile viewport behavior
    window.addEventListener("resize", () => {
      if (filteredContractors.length) {
        setTimeout(() => {
          fitMapToVisibleResults();
          if (activeCardId) scrollCardIntoView(activeCardId);
        }, 150);
      }
    });
  </script>
</body>
</html>
