<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RevampLEX v6 Working</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body, html { margin:0; height:100%; font-family:Arial; }
#map { height:100%; }
#welcomeOverlay {
  position:fixed;
  top:0;left:0;width:100%;height:100%;
  background:#fff;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  z-index:9999;
}
button { padding:12px 20px; margin:10px; cursor:pointer; }
</style>
</head>

<body>

<div id="welcomeOverlay">
  <h1>Welcome to Revamp</h1>
  <button onclick="enterApp('homeowner')">Homeowner</button>
  <button onclick="enterApp('contractor')">Contractor</button>
</div>

<div id="map"></div>

<script>

// SUPABASE
const SUPABASE_URL = "https://dezvwoedboikshqttdqu.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRlenZ3b2VkYm9pa3NocXR0ZHF1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwMDMzNzQsImV4cCI6MjA4ODU3OTM3NH0.5SGfJadjBug9oDOrdvjIM36SwFxe1_yzpry0q67iM-E";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// MODE SYSTEM
let currentMode = localStorage.getItem("revamp_mode");

function enterApp(mode){
  localStorage.setItem("revamp_mode", mode);
  location.reload();
}

if(currentMode){
  document.getElementById("welcomeOverlay").style.display = "none";
  initMap();
}else{
  document.getElementById("welcomeOverlay").style.display = "flex";
}

// MAP INIT
function initMap(){

  const map = L.map('map').setView([40.8859, -74.0435], 11);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
  }).addTo(map);

  // DEMO DATA
  const jobs = [
    {id:1, lat:40.88, lng:-74.04, title:"Roof Job"},
    {id:2, lat:40.89, lng:-74.02, title:"Kitchen Job"}
  ];

  const contractors = [
    {id:10, lat:40.87, lng:-74.05, name:"Plumber"},
    {id:11, lat:40.90, lng:-74.01, name:"Electrician"}
  ];

  const data = currentMode === "contractor" ? jobs : contractors;

  data.forEach(item=>{
    const marker = L.marker([item.lat,item.lng]).addTo(map);

    if(currentMode === "contractor"){
      marker.bindPopup(`
        <b>${item.title}</b><br>
        <button onclick="submitBid(${item.id})">Bid</button>
      `);
    } else {
      marker.bindPopup(`<b>${item.name}</b>`);
    }
  });

}

// PRIVATE BID FUNCTION
async function submitBid(jobId){

  const { error } = await supabase
    .from("bids")
    .insert([
      {
        job_id: jobId,
        contractor_id: "demo-user",
        amount: 1000,
        message: "Test bid"
      }
    ]);

  if(error){
    alert("Error submitting bid");
    console.log(error);
    return;
  }

  alert("Bid submitted (private)");
}

</script>

</body>
</html>
