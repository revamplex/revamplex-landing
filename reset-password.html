<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Reset Password | RevampLEX</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f8fafc;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: #0f172a;
    }

    .card {
      width: min(420px, calc(100vw - 24px));
      background: white;
      border-radius: 18px;
      padding: 28px;
      box-shadow: 0 18px 42px rgba(15,23,42,.16);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 26px;
    }

    p {
      color: #64748b;
      line-height: 1.5;
    }

    input {
      width: 100%;
      box-sizing: border-box;
      padding: 13px;
      border-radius: 12px;
      border: 1px solid #ddd;
      margin: 10px 0;
      font-size: 16px;
    }

    button {
      width: 100%;
      height: 46px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #f97316, #ea580c);
      color: white;
      font-weight: 800;
      cursor: pointer;
      margin-top: 10px;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>Reset Password</h1>
    <p>Enter your new password below.</p>

    <input id="newPassword" type="password" placeholder="New password">
    <input id="confirmPassword" type="password" placeholder="Confirm password">

    <button id="savePasswordBtn">Save New Password</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    const supabaseClient = window.supabase.createClient(
      "https://dezvwoedboikshqttdqu.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRlenZ3b2VkYm9pa3NocXR0ZHF1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwMDMzNzQsImV4cCI6MjA4ODU3OTM3NH0.5SGfJadjBug9oDOrdvjIM36SwFxe1_yzpry0q67iM-E"
    );

    document.getElementById("savePasswordBtn").addEventListener("click", async () => {
      const password = document.getElementById("newPassword").value.trim();
      const confirmPassword = document.getElementById("confirmPassword").value.trim();

      if (password.length < 6) {
        alert("Password must be at least 6 characters.");
        return;
      }

      if (password !== confirmPassword) {
        alert("Passwords do not match.");
        return;
      }

      const { error } = await supabaseClient.auth.updateUser({
        password: password
      });

      if (error) {
        alert(error.message);
        return;
      }

      alert("Password updated. You can now log in.");
      window.location.href = "map.html";
    });
  </script>
</body>
</html>
